/* ============================================================
   SMART ALERTS (تنبيهات ذكية) — shown in dashboard
   ============================================================ */
function getAlerts(){
  const alerts=[];
  const thisMonth=today().slice(0,7);
  // Low stock
  db.products.filter(p=>p.qty<=p.min).forEach(p=>{
    alerts.push({type:'stock',icon:'📦',msg:L(`الصنف "${p.name}" وصل للحد الأدنى (${p.qty} متبقي)`,`"${p.name}" reached minimum stock (${p.qty} left)`),action:L('شراء','Buy'),view:'purchaseOrders'});
  });
  // Old debts (customers owing >30 days)
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);const cutS=cutoff.toISOString().slice(0,10);
  db.customers.filter(c=>c.balance>0).forEach(c=>{
    const oldSale=db.sales.filter(s=>s.customerId===c.id&&(s.dueAmount||0)>0&&s.date<cutS);
    if(oldSale.length)alerts.push({type:'debt',icon:'💸',msg:L(`${c.name} — دين قديم (+30 يوم): ${money(c.balance)}`,`${c.name} — old debt (+30 days): ${money(c.balance)}`),action:L('تحصيل','Collect'),view:'customers'});
  });
  // Overdue invoices (past due date by 7+ days)
  const tdyS=today();const ovCut=addDays(tdyS,-7);
  db.sales.filter(s=>(s.dueAmount||0)>0&&s.dueDate&&s.dueDate<ovCut).forEach(s=>{
    const dleft=Math.floor((new Date(tdyS)-new Date(s.dueDate))/86400000);
    alerts.push({type:'overdue',icon:'⏰',msg:L(`فاتورة #${s.no} (${s.customerName||'نقدي'}) متأخرة ${dleft} يوم — ${money(s.dueAmount)}`,`Invoice #${s.no} (${s.customerName||'Cash'}) overdue ${dleft} days — ${money(s.dueAmount)}`),action:L('تحصيل','Collect'),view:'sales'});
  });
  // Customer birthdays today
  const md=today().slice(5);
  db.customers.filter(c=>c.bday&&c.bday.slice(5)===md).forEach(c=>{
    alerts.push({type:'bday',icon:'🎂',msg:L(`عيد ميلاد ${c.name} اليوم — أرسل تهنئة`,`${c.name}'s birthday today — send a greeting`),action:L('العملاء','Customers'),view:'customers'});
  });
  // Expiry alerts
  db.products.forEach(p=>{const s=expiryStatus(p);if(s==='expired')alerts.push({type:'expiry',icon:'⛔',msg:L(`"${p.name}" منتهي الصلاحية (${p.expiry})`,`"${p.name}" expired (${p.expiry})`),action:L('المخزون','Stock'),view:'products'});else if(s==='soon')alerts.push({type:'expiry',icon:'⏳',msg:L(`"${p.name}" قرب انتهاء صلاحيته (${p.expiry})`,`"${p.name}" expiring soon (${p.expiry})`),action:L('المخزون','Stock'),view:'products'});});
  // Unpaid salaries
  db.employees.forEach(e=>{
    const paid=(e.payments||[]).find(p=>p.month===thisMonth);
    if(!paid)alerts.push({type:'salary',icon:'👤',msg:L(`لم يُصرف راتب ${e.name} لهذا الشهر`,`${e.name}'s salary for this month not paid`),action:L('صرف','Pay'),view:'employees'});
  });
  // Target alert
  const tgt=db.targets.find(t=>t.month===thisMonth);
  if(tgt){
    const sales=db.sales.filter(s=>s.date.slice(0,7)===thisMonth).reduce((s,i)=>s+i.total,0);
    const pct=Math.round(sales/tgt.amount*100);
    const today_d=new Date();const daysLeft=new Date(today_d.getFullYear(),today_d.getMonth()+1,0).getDate()-today_d.getDate();
    if(pct<80&&daysLeft<10)alerts.push({type:'target',icon:'🎯',msg:L(`هدف الشهر: أنجزت ${pct}% فقط — ${daysLeft} يوم متبقي`,`Month target: only ${pct}% achieved — ${daysLeft} days left`),action:L('التفاصيل','Details'),view:'targets'});
  }
  // Smart reorder: items running out within 5 days based on velocity
  try{const ro=reorderSuggestions(5).filter(r=>r.willRunOut).slice(0,5);
    ro.forEach(r=>alerts.push({type:'reorder',icon:'📦',msg:L(`"${r.name}" يكفي ${r.daysLeft} يوم فقط — اطلب ~${r.suggest}`,`"${r.name}" lasts ${r.daysLeft} days — order ~${r.suggest}`),action:L('الرؤى','Insights'),view:'insights'}));
  }catch(e){}
  // Dead stock value alert (only if meaningful)
  try{const dead=deadStock(60);const tied=dead.reduce((a,d)=>a+d.tied,0);
    if(dead.length>=3&&tied>0)alerts.push({type:'dead',icon:'🧊',msg:L(`${dead.length} أصناف راكدة منذ 60 يوم — ${money(tied)} فلوس واقفة`,`${dead.length} items idle 60 days — ${money(tied)} tied up`),action:L('الرؤى','Insights'),view:'insights'});
  }catch(e){}
  return alerts;}

    <div class="card kpi-2"><div class="ic-bg">📦</div><div class="lbl">${L('أصناف تحتاج طلب','Items to reorder')}</div><div class="val" style="color:var(--accent)">${reorder.length}</div><div class="sub">${L('خلال أسبوع','within a week')}</div></div>

    <div class="card kpi-4"><div class="ic-bg">🧊</div><div class="lbl">${L('بضاعة راكدة','Dead stock value')}</div><div class="val" style="font-size:20px;color:var(--danger)">${money(dead.reduce((a,d)=>a+d.tied,0))}</div><div class="sub">${dead.length} ${L('صنف','items')}</div></div>

      <tr><td style="color:var(--ok)">+ ${L('تحصيلات مستحقة من العملاء','Receivables due')}</td><td class="t-num" style="color:var(--ok)">${money(cf.inflow)}</td></tr>

  </div></div>

  <div class="panel"><div class="panel-h"><h3>🏆 ${L('الأكثر ربحاً (مش الأكثر مبيعاً)','Most Profitable (not most sold)')}</h3></div><div class="panel-b">
    ${topProfit.length?`<table><thead><tr><th>${L('الصنف','Item')}</th><th>${L('كمية مباعة','Sold')}</th><th>${L('الإيراد','Revenue')}</th><th>${L('الربح','Profit')}</th><th>${L('الهامش','Margin')}</th></tr></thead><tbody>
    ${topProfit.map(r=>`<tr><td><b>${esc(r.name)}</b><div class="profit-bar" style="margin-top:4px"><div class="fill" style="width:${Math.round(r.profit/maxP*100)}%;background:var(--ok)"></div></div></td><td class="t-num">${fmt(r.qty)}</td><td class="t-num">${money(r.revenue)}</td><td class="t-num" style="color:var(--ok)"><b>${money(r.profit)}</b></td><td class="t-num"><span style="color:${r.marginPct>=30?'var(--ok)':r.marginPct>=15?'var(--gold)':'var(--danger)'}">${r.marginPct}%</span></td></tr>`).join('')}</tbody></table>`:`<div class="empty">${L('لا توجد مبيعات في الفترة','No sales in range')}</div>`}
  </div></div>

  ${lowMargin.length?`<div class="panel"><div class="panel-h"><h3>⚠️ ${L('يتباع كثيراً وربحه ضعيف','Sells a lot, low profit')}</h3></div><div class="panel-b">

  </div></div>`:''}

  ${hidden.length?`<div class="panel"><div class="panel-h"><h3>💎 ${L('كنوز خفية (ربح عالٍ للقطعة)','Hidden gems (high profit/unit)')}</h3></div><div class="panel-b">

    ${hidden.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td class="t-num" style="color:var(--ok)">${money(r.qty>0?r.profit/r.qty:r.price-r.cost)}</td><td class="t-num">${r.marginPct}%</td><td style="font-size:12px;color:var(--muted)">${L('اعرضه أكثر / روّج له','Feature it / promote')}</td></tr>`).join('')}</tbody></table>

  <div class="panel"><div class="panel-h"><h3>📦 ${L('اقتراح إعادة الطلب','Reorder Suggestions')}</h3>${reorder.length?`<div style="display:flex;gap:6px">${canView('purchases')?`<button class="btn btn-primary btn-sm" onclick="reorderToPurchase()">🛒 ${L('حوّل لطلب شراء','To purchase order')}</button>`:''}<button class="btn btn-ghost btn-sm" onclick="exportReorderCSV()">📊 CSV</button></div>`:''}</div><div class="panel-b">
    ${reorder.length?`<table><thead><tr><th>${L('الصنف','Item')}</th><th>${L('المتاح','Stock')}</th><th>${L('معدل البيع/يوم','Sold/day')}</th><th>${L('يكفي','Lasts')}</th><th>${L('اطلب','Order')}</th></tr></thead><tbody>
    ${reorder.map(r=>`<tr><td><b>${esc(r.name)}</b>${r.low?` <span class="badge danger" style="font-size:9px">${L('منخفض','Low')}</span>`:''}</td><td class="t-num">${fmt(r.stock)}</td><td class="t-num">${r.velocity>0?fmt(r.velocity):'—'}</td><td class="t-num">${r.daysLeft===Infinity?'∞':r.daysLeft+' '+L('يوم','d')}</td><td class="t-num"><b style="color:var(--accent)">${fmt(r.suggest)}</b></td></tr>`).join('')}</tbody></table>`:`<div class="empty"><span class="big">✅</span>${L('لا حاجة لطلب الآن','Nothing to reorder now')}</div>`}

    ${dormant.map(c=>`<tr><td><b>${esc(c.name)}</b></td><td class="t-num" style="color:var(--danger)">${c.sinceLast} ${L('يوم','d')}</td><td class="t-num">${c.avgGap} ${L('يوم','d')}</td><td class="t-num">${money(c.total)}</td><td style="text-align:left">${c.phone?`<button class="btn btn-ghost btn-sm" style="color:#25D366" onclick="waCustomer('${c.id}')">📱 ${L('راسله','Message')}</button>`:'—'}</td></tr>`).join('')}</tbody></table>`:`<div class="empty"><span class="big">👍</span>${L('كل عملائك نشطون','All customers active')}</div>`}
  </div></div>

  <div class="panel"><div class="panel-h"><h3>🧊 ${L('بضاعة راكدة (فلوس واقفة)','Dead Stock (tied-up money)')}</h3></div><div class="panel-b">
    ${dead.length?`<table><thead><tr><th>${L('الصنف','Item')}</th><th>${L('المتاح','Stock')}</th><th>${L('فلوس واقفة','Tied money')}</th><th>${L('اقتراح','Suggestion')}</th></tr></thead><tbody>
    ${dead.slice(0,12).map(d=>`<tr><td><b>${esc(d.name)}</b></td><td class="t-num">${fmt(d.stock)}</td><td class="t-num" style="color:var(--danger)">${money(d.tied)}</td><td style="font-size:12px;color:var(--muted)">${L('اعمل عرض / خصم لتحريكها','Run a promo to move it')}</td></tr>`).join('')}</tbody></table>${dead.length>12?`<div class="hint">${L('عرض أعلى 12 صنف','Top 12 shown')}</div>`:''}`:`<div class="empty"><span class="big">✅</span>${L('لا بضاعة راكدة','No dead stock')}</div>`}
  </div></div>`;};
function exportReorderCSV(){const r=reorderSuggestions(7);if(!r.length)return toast(L('لا توجد اقتراحات','Nothing to reorder'),'err');
  const rows=[[L('الصنف','Item'),L('المتاح','Stock'),L('معدل البيع اليومي','Daily velocity'),L('يكفي (يوم)','Days left'),L('الكمية المقترحة','Suggested order')]];
  r.forEach(x=>rows.push([x.name,x.stock,fmt(x.velocity),x.daysLeft===Infinity?'∞':x.daysLeft,x.suggest]));
  downloadCSV('reorder-'+today()+'.csv',rows);}
function reorderToPurchase(){if(!canView('purchases'))return toast(L('غير متاح لهذا الدور','Not available for this role'),'err');
  const r=reorderSuggestions(7);if(!r.length)return toast(L('لا توجد اقتراحات','Nothing to reorder'),'err');
  invoiceForm('purchase');
  invLines=r.map(x=>{const p=findProduct(x.pid);return {pid:x.pid,qty:x.suggest,price:p?(p.cost||0):0};});
  renderInvLines();calcInv();
  const h=document.querySelector('#modal .modal-h h3');if(h)h.innerHTML=`📦 ${L('طلب شراء مقترح','Suggested Purchase Order')}`;
  toast(L('تم تجهيز طلب شراء بالأصناف المقترحة — راجعه قبل الحفظ','Draft purchase prepared — review before saving'));}

let auditFrom='',auditTo='',auditQ='';
views.audit=()=>{
  if(!canView('audit')){go(defaultView());return;}
  document.getElementById('topActions').innerHTML=`<button class="btn btn-ghost" onclick="exportAuditCSV()">📊 ${L('تصدير','Export')}</button>`;
  const list=db.audit.filter(a=>inRange(a.at.slice(0,10),auditFrom,auditTo)&&(matches(a.action,auditQ)||matches(a.detail,auditQ)||matches(a.user,auditQ))).slice().reverse();
  document.getElementById('content').innerHTML=`<div class="panel"><div class="panel-h" style="flex-wrap:wrap;gap:10px"><h3>🛡️ ${L('سجل التدقيق','Audit Log')}</h3>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="date" value="${auditFrom}" onchange="auditFrom=this.value;views.audit()" style="padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);font-size:12px">
      <span style="color:var(--muted)">→</span>
      <input type="date" value="${auditTo}" onchange="auditTo=this.value;views.audit()" style="padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);font-size:12px">
      <div class="search"><input placeholder="${L('بحث…','Search…')}" value="${esc(auditQ)}" oninput="auditQ=this.value;views.audit()"><span class="si">🔍</span></div>
    </div></div><div class="panel-b">
    ${list.length?`<table><thead><tr><th>${L('التاريخ والوقت','Date & Time')}</th><th>${L('المستخدم','User')}</th><th>${L('الإجراء','Action')}</th><th>${L('التفاصيل','Details')}</th></tr></thead><tbody>
    ${list.slice(0,500).map(a=>{const d=new Date(a.at);return `<tr><td style="font-size:12px;white-space:nowrap">${d.toLocaleString(LANG==='ar'?'ar-EG':'en-US',{year:'2-digit',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td><td><span class="badge muted">${esc(a.user)}</span></td><td>${esc(a.action)}</td><td style="color:var(--muted)">${esc(a.detail)||'—'}</td></tr>`;}).join('')}</tbody></table>${list.length>500?`<div class="hint">${L('عرض أحدث 500 سجل','Showing latest 500 entries')}</div>`:''}`:`<div class="empty"><span class="big">🛡️</span>${L('لا توجد سجلات في هذه الفترة','No log entries in this range')}</div>`}</div></div>`;};
function exportAuditCSV(){const list=db.audit.filter(a=>inRange(a.at.slice(0,10),auditFrom,auditTo));
  if(!list.length)return toast(L('لا توجد سجلات','No entries'),'err');
  const rows=[[L('التاريخ والوقت','DateTime'),L('المستخدم','User'),L('الدور','Role'),L('الإجراء','Action'),L('التفاصيل','Details'),L('الفرع','Branch')]];
  list.forEach(a=>rows.push([a.at,a.user,roleName(a.role),a.action,a.detail||'',branchName(a.branch)]));
  downloadCSV('audit-'+today()+'.csv',rows);}

/* Boot */
async function startApp(){
  if(APP_STARTED)return;APP_STARTED=true;
  // if this user was invited to a shop, join it before loading (so they land in that shop)
  try{ if(sb&&CURRENT_UID) await sb.rpc('accept_my_invites'); }catch(e){ console.warn('accept invites',e); }
  await load();
  // stamp the signed-in account (for the badge + audit log)
  try{const {data:{session}}=await sb.auth.getSession();if(session&&session.user)db.settings.cloudEmail=session.user.email;}catch(e){}
  applyLang();applyBrand();applyCustomBrand();renderBranchSel();
  if(db.settings.theme==='dark'){document.body.classList.add('dark');document.getElementById('themeBtn').textContent='☀️';}
  if(db.settings.pin){document.getElementById('lock').style.display='flex';setTimeout(()=>document.getElementById('lockPin').focus(),100);}
  go(defaultView());autoBackupCheck();
}
if(sb){
  sb.auth.onAuthStateChange((event)=>{ if(event==='PASSWORD_RECOVERY'){ showRecoveryScreen(); } });
}
(async function(){
  if(!sb){showAuthScreen();setAuthMsg(L('تعذّر تحميل مكتبة الاتصال. تأكد من الإنترنت وأعد التحميل.','Could not load the connection library. Check your internet and reload.'),'err');return;}
  // Came here from a password-reset email link? show the set-new-password screen and stop.
  const isRecovery=/(?:[#&?])type=recovery/.test(location.hash)||/(?:[#&?])type=recovery/.test(location.search);
  if(isRecovery){showRecoveryScreen();return;}
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(session&&session.user){CURRENT_UID=session.user.id;await startApp();}
    else{showAuthScreen();}
  }catch(e){console.warn('auth boot error',e);showAuthScreen();}
})();
</script>
