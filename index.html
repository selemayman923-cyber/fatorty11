<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي — نظام إدارة المبيعات والحسابات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cairo:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#f4f1ea; --panel:#fff; --ink:#1c2521; --muted:#7c857f; --line:#e6e1d6;
  --primary:#0f6b5c; --primary-d:#0a5044; --primary-soft:#e3f0ec;
  --accent:#c9783b; --accent-soft:#f7e8dc; --gold:#b8923a;
  --danger:#c0392b; --danger-soft:#fbe9e7; --ok:#2e7d52;
  --blue:#3b7fc9; --sidebar:#13231f;
  --shadow:0 1px 3px rgba(20,40,35,.06),0 8px 24px rgba(20,40,35,.06);
}
body.dark{
  --bg:#0f1c18; --panel:#16231e; --ink:#e6efe9; --muted:#8ba39b; --line:#26352f;
  --primary-soft:#143029; --accent-soft:#2c2017; --danger-soft:#2e1b18;
  --shadow:0 1px 3px rgba(0,0,0,.35),0 8px 24px rgba(0,0,0,.35);
}
body.dark{background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.03) 1px,transparent 0)}
body.dark .topbar{background:rgba(22,35,30,.85)}
body.dark th{background:#12201b}
body.dark tbody tr:hover{background:#1b2a24}
body.dark .pos-card,body.dark .cart,body.dark .field input,body.dark .field select,body.dark .field textarea,body.dark .search input,body.dark .modal-h .x,body.dark .qstep button{background:#1b2a24}
body.dark .pill-tabs,body.dark .modal-h .x{background:#12201b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;
  background-image:radial-gradient(circle at 1px 1px,rgba(15,107,92,.04) 1px,transparent 0);background-size:22px 22px;transition:background .2s,color .2s}
h1,h2,h3,h4{font-family:'Cairo',sans-serif;font-weight:700;line-height:1.3}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--sidebar);color:#cfe0db;position:fixed;top:0;right:0;height:100vh;display:flex;flex-direction:column;z-index:50}
html[dir=ltr] .sidebar{right:auto;left:0}
.brand{padding:20px 22px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand .logo{display:flex;align-items:center;gap:11px}
.brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--primary),#1ba086);display:grid;place-items:center;font-family:'Cairo';font-weight:800;color:#fff;font-size:19px;box-shadow:0 4px 12px rgba(15,107,92,.4)}
.brand h1{color:#fff;font-size:16px}
.brand p{color:#7d9690;font-size:11px;font-weight:400}
.nav{padding:10px 12px;flex:1;overflow-y:auto}
.nav .group{color:#5f7b74;font-size:10.5px;font-weight:600;letter-spacing:.5px;padding:12px 12px 5px}
.nav a{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;color:#bcd0cb;text-decoration:none;font-size:13.5px;font-weight:500;margin-bottom:2px;transition:.15s}
.nav a .ic{width:20px;text-align:center;font-size:15px;opacity:.85}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:linear-gradient(90deg,var(--primary),rgba(27,160,134,.7));color:#fff;box-shadow:0 4px 12px rgba(15,107,92,.35)}
.sidebar .foot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:#6f8b84}
.main{margin-right:248px;flex:1;min-width:0}
html[dir=ltr] .main{margin-right:0;margin-left:248px}
.topbar{background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar .ttl h2{font-size:19px}
.topbar .ttl p{color:var(--muted);font-size:12px}
.topbar .acts{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.content{padding:24px 28px 60px}
.btn{border:none;border-radius:10px;padding:10px 16px;font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(15,107,92,.25)}
.btn-primary:hover{background:var(--primary-d)}
.btn-ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{filter:brightness(.94)}
.btn-danger{background:var(--danger-soft);color:var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.btn-blue{background:var(--blue);color:#fff}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card .ic-bg{position:absolute;left:-8px;top:-8px;font-size:64px;opacity:.05}
.card .lbl{color:var(--muted);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:7px}
.card .val{font-family:'Cairo';font-size:25px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
.card .sub{font-size:11.5px;margin-top:3px;color:var(--muted)}.card .sub.up{color:var(--ok)}.card .sub.down{color:var(--danger)}
.card.kpi-1{border-top:3px solid var(--primary)}.card.kpi-2{border-top:3px solid var(--accent)}
.card.kpi-3{border-top:3px solid var(--gold)}.card.kpi-4{border-top:3px solid var(--blue)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:22px}
.panel-h{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.panel-h h3{font-size:16px}
.panel-b{padding:6px 0}.panel-b.pad{padding:20px}
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:10px 18px;font-size:11.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line);background:#faf9f5;white-space:nowrap}
html[dir=ltr] th{text-align:left}
td{padding:11px 18px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:.12s}tbody tr:hover{background:#faf9f3}
.t-num{font-variant-numeric:tabular-nums;font-weight:600}
.empty{text-align:center;color:var(--muted);padding:46px 20px;font-size:13.5px}
.empty .big{font-size:42px;opacity:.3;display:block;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge.ok{background:var(--primary-soft);color:var(--primary-d)}
.badge.warn{background:#fdf2dd;color:var(--gold)}
.badge.danger{background:var(--danger-soft);color:var(--danger)}
.badge.info{background:#e7f0fb;color:var(--blue)}
.badge.muted{background:var(--line);color:var(--muted)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fcfcfa;transition:.15s;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);background:var(--panel);box-shadow:0 0 0 3px var(--primary-soft)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.modal-bg{position:fixed;inset:0;background:rgba(20,35,30,.5);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:36px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border-radius:18px;width:100%;max-width:560px;box-shadow:0 24px 64px rgba(0,0,0,.25);animation:pop .2s ease}
.modal.lg{max-width:880px}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal-h{padding:17px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{font-size:17px}
.modal-h .x{background:#f1efe8;border:none;width:32px;height:32px;border-radius:9px;font-size:18px;color:var(--muted)}
.modal-h .x:hover{background:var(--danger-soft);color:var(--danger)}
.modal-b{padding:22px}
.modal-f{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-start;flex-wrap:wrap}
.inv-items th,.inv-items td{padding:7px 10px}
.inv-items input,.inv-items select{padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--panel);width:100%;color:var(--ink)}
.inv-totals{margin-top:16px;margin-right:auto;width:320px}
html[dir=ltr] .inv-totals{margin-right:0;margin-left:auto}
.inv-totals .row{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px}
.inv-totals .row.grand{border-top:2px solid var(--ink);margin-top:6px;padding-top:10px;font-size:18px;font-family:'Cairo';font-weight:800;color:var(--primary-d)}
.search{position:relative}
.search input{padding:9px 36px 9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel);width:240px;color:var(--ink)}
.search .si{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted)}
html[dir=ltr] .search .si{right:auto;left:11px}
.row-acts{display:flex;gap:6px;flex-wrap:wrap}
.iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel);display:grid;place-items:center;font-size:14px;color:var(--muted)}
.iconbtn:hover{border-color:var(--primary);color:var(--primary)}
.iconbtn.del:hover{border-color:var(--danger);color:var(--danger)}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:200px;padding:10px 4px}
.bar-chart .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.bar-chart .bar{width:100%;max-width:42px;background:linear-gradient(180deg,var(--primary),#1ba086);border-radius:7px 7px 0 0;min-height:3px;transition:.4s}
.bar-chart .bar:hover{filter:brightness(1.1)}
.bar-chart .bl{font-size:11px;color:var(--muted)}
.bar-chart .bv{font-size:10.5px;font-weight:700;color:var(--primary-d)}
.pill-tabs{display:flex;gap:6px;background:var(--line);padding:4px;border-radius:12px}
.pill-tabs button{flex:1;border:none;background:transparent;padding:7px 12px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.pill-tabs button.active{background:var(--panel);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.profit-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:4px}
.profit-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),#1ba086);transition:.4s}
.progress-ring{width:120px;height:120px;position:relative;display:inline-flex;align-items:center;justify-content:center}
.progress-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.progress-ring .val{font-family:'Cairo';font-weight:800;font-size:22px;color:var(--primary-d)}
.target-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow);text-align:center}
.kpi-compare{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.kpi-compare.up{color:var(--ok)}.kpi-compare.down{color:var(--danger)}
.emp-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#1ba086);display:inline-flex;align-items:center;justify-content:center;font-family:Cairo;font-weight:700;color:#fff;font-size:14px}
.alert-dot{display:inline-block;width:8px;height:8px;background:var(--danger);border-radius:50%;margin-right:4px}
.cat-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--muted);transition:.15s}
.cat-chip:hover,.cat-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.toast{position:fixed;bottom:24px;left:24px;background:var(--ink);color:var(--panel);padding:13px 20px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:0 12px 32px rgba(0,0,0,.3);z-index:200;display:flex;align-items:center;gap:9px;transform:translateY(80px);opacity:0;transition:.3s}
.toast.show{transform:none;opacity:1}.toast.ok{background:var(--primary-d);color:#fff}.toast.err{background:var(--danger);color:#fff}
.hint{font-size:12px;color:var(--ink);background:var(--primary-soft);padding:10px 14px;border-radius:10px;margin-bottom:16px;display:flex;gap:8px;align-items:flex-start}
@media(max-width:1000px){.cards{grid-template-columns:1fr 1fr}.sidebar{transform:translateX(100%)}.main{margin-right:0;margin-left:0}}
.loading{display:grid;place-items:center;height:100vh;color:var(--muted)}
.pos{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:12px}
.pos-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);text-align:center}
.pos-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.pos-card .nm{font-weight:600;font-size:13px;margin:6px 0 2px}
.pos-card .pr{color:var(--primary-d);font-weight:700;font-size:13px}
.pos-card .q{font-size:11px;color:var(--muted)}
.pos-card.out{opacity:.45;pointer-events:none}
.cart{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);position:sticky;top:80px}
.cart-h{padding:14px 18px;border-bottom:1px solid var(--line);font-family:'Cairo';font-weight:700;display:flex;justify-content:space-between;align-items:center}
.cart-items{max-height:40vh;overflow-y:auto}
.cart-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--line)}
.cart-row .ci-n{flex:1;font-size:13px;font-weight:600}
.cart-row .ci-p{font-size:11.5px;color:var(--muted)}
.qstep{display:flex;align-items:center;gap:6px}
.qstep button{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:#faf9f5;font-weight:700;color:var(--primary-d)}
.qstep span{min-width:22px;text-align:center;font-weight:700}
.cart-f{padding:16px 18px;border-top:1px solid var(--line)}
.cart-f .tt{display:flex;justify-content:space-between;font-family:'Cairo';font-weight:800;font-size:20px;color:var(--primary-d);margin-bottom:12px}
@media print{.sidebar,.topbar,.modal-f,.no-print{display:none!important}.main{margin:0}.content{padding:0}.modal-bg{position:static;background:none;padding:0;display:block}.modal{box-shadow:none;max-width:100%;border-radius:0}body{background:#fff;background-image:none}}
.lock{position:fixed;inset:0;background:var(--sidebar);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff}
.lock .box{background:rgba(255,255,255,.06);padding:34px 40px;border-radius:20px;text-align:center;width:320px}
.lock input{width:100%;text-align:center;font-size:22px;letter-spacing:8px;padding:12px;border-radius:12px;border:none;margin:16px 0}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo"><div class="mark" id="brandMark">حـ</div>
      <div><h1 id="brandName">حسابي</h1><p id="brandTag">إدارة المبيعات والحسابات</p></div></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot" id="footNote">بياناتك محفوظة تلقائيًا على جهازك</div>
  </aside>
  <div class="main">
    <div class="topbar"><div class="ttl"><h2 id="pageTitle">لوحة التحكم</h2><p id="pageSub"></p></div>
      <div class="acts">
        <select id="branchSel" onchange="switchBranch(this.value)" title="الفرع النشط" style="padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--ink);font-size:12.5px;font-weight:600"></select>
        <button class="iconbtn" id="langBtn" onclick="toggleLang()" title="English / عربي">EN</button>
        <button class="iconbtn" id="themeBtn" onclick="toggleTheme()" title="الوضع الليلي">🌙</button>
        <button class="iconbtn" id="alertsBtn" onclick="go('dashboard')" title="${L('التنبيهات','Alerts')}" style="position:relative">🔔<span id="alertsBadge" style="display:none;position:absolute;top:-4px;left:-4px;min-width:16px;height:16px;background:var(--danger);color:#fff;border-radius:8px;font-size:10px;font-weight:700;padding:0 3px;line-height:16px;text-align:center"></span></button>
      <div id="topActions" style="display:flex;gap:10px;flex-wrap:wrap"></div>
      </div></div>
    <div id="backupBanner" style="display:none;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:var(--danger);color:#fff;padding:10px 20px;font-size:13px;font-weight:600"></div>
    <div class="content" id="content"><div class="loading">…</div></div>
  </div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<div class="lock" id="lock" style="display:none"><div class="box">
  <div style="font-size:40px">🔒</div><h3 style="margin-top:10px" id="lockTtl">النظام مقفل</h3>
  <input id="lockPin" type="password" inputmode="numeric" maxlength="8" placeholder="••••" onkeydown="if(event.key==='Enter')tryUnlock()">
  <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="tryUnlock()" id="lockBtn">دخول</button>
</div></div>

<script>
/* ============ i18n ============ */
let LANG='ar';
const I={
  ar:{tag:'إدارة المبيعات والحسابات',foot:'بياناتك محفوظة تلقائيًا على جهازك',
    nav_main:'الرئيسية',nav_dashboard:'لوحة التحكم',nav_pos:'نقطة البيع (كاشير)',nav_trade:'المبيعات والمشتريات',
    nav_sales:'فواتير البيع',nav_purchases:'فواتير الشراء',nav_quotes:'عروض الأسعار',nav_returns:'المرتجعات',
    nav_stock:'المخزون والأطراف',nav_products:'الأصناف والمخزون',nav_customers:'العملاء',nav_suppliers:'الموردون',
    nav_fin:'المالية',nav_treasury:'الخزينة',nav_expenses:'المصروفات',nav_reports:'التقارير',nav_settings:'الإعدادات',nav_employees:'الموظفون والرواتب',nav_targets:'أهداف المبيعات',nav_po:'أوامر الشراء',
    lock_t:'النظام مقفل',lock_b:'دخول'},
  en:{tag:'Sales & Accounting System',foot:'Your data is saved automatically on this device',
    nav_main:'Main',nav_dashboard:'Dashboard',nav_pos:'Point of Sale',nav_trade:'Sales & Purchases',
    nav_sales:'Sales Invoices',nav_purchases:'Purchase Invoices',nav_quotes:'Quotations',nav_returns:'Returns',
    nav_stock:'Inventory & Parties',nav_products:'Products & Stock',nav_customers:'Customers',nav_suppliers:'Suppliers',
    nav_fin:'Finance',nav_treasury:'Treasury',nav_expenses:'Expenses',nav_reports:'Reports',nav_settings:'Settings',nav_employees:'Employees & Payroll',nav_targets:'Sales Targets',nav_po:'Purchase Orders',
    lock_t:'System Locked',lock_b:'Enter'}
};
const t=k=>I[LANG][k]||k;
// page titles + subs bilingual
const PG={dashboard:[['لوحة التحكم','نظرة عامة على أداء مشروعك'],['Dashboard','Overview of your business performance']],
  pos:[['نقطة البيع','بيع سريع للكاشير'],['Point of Sale','Fast cashier checkout']],
  sales:[['فواتير البيع','إدارة وإصدار فواتير المبيعات'],['Sales Invoices','Manage & issue sales invoices']],
  purchases:[['فواتير الشراء','تسجيل مشترياتك من الموردين'],['Purchase Invoices','Record purchases from suppliers']],
  quotes:[['عروض الأسعار','عروض تتحول لفواتير'],['Quotations','Quotes that convert to invoices']],
  returns:[['المرتجعات','مرتجعات البيع والشراء'],['Returns','Sales & purchase returns']],
  products:[['الأصناف والمخزون','كل منتجاتك وكمياتها'],['Products & Stock','All your products and quantities']],
  customers:[['العملاء','بيانات العملاء وأرصدتهم'],['Customers','Customer data & balances']],
  suppliers:[['الموردون','بيانات الموردين وأرصدتهم'],['Suppliers','Supplier data & balances']],

  if(list.length){addToCart(list[0].id);document.getElementById('posSearch').value='';renderPosGrid('');}}
function posKeys(e){if(current!=='pos')return;
  if(e.key==='F2'){e.preventDefault();document.getElementById('posSearch')?.focus();}
  else if(e.key==='F4'){e.preventDefault();document.getElementById('posBarcode')?.focus();}
  else if(e.key==='F9'){e.preventDefault();if(cart.length)posCheckout();}
  else if(e.key==='Escape'){if(cart.length){cart=[];renderCart();}}}
if(!window._posKeysBound){document.addEventListener('keydown',posKeys);window._posKeysBound=true;}
function filterPosCustomers(q){const sel=document.getElementById('posCustomer');if(!sel)return;const cur=sel.value;
  const list=db.customers.filter(c=>c.name.includes(q)||(c.phone||'').includes(q));
  sel.innerHTML=`<option value="">${L('عميل نقدي','Cash customer')}</option>`+list.map(c=>`<option value="${c.id}">${esc(c.name)}${c.phone?' — '+esc(c.phone):''}</option>`).join('');
  if(list.find(c=>c.id===cur))sel.value=cur;else if(list.length===1)sel.value=list[0].id;}
function renderPosGrid(q){const list=db.products.filter(p=>p.name.includes(q)||(p.sku||'').includes(q));

function scanBarcode(el){const code=el.value.trim();if(!code)return;const p=db.products.find(x=>x.sku===code);if(p){addToCart(p.id);el.value='';}else toast(L('لا يوجد صنف بهذا الكود','No item with this code'),'err');}
function exportProductsCSV(){if(!db.products.length)return toast(L('لا توجد أصناف','No items'),'err');
  const rows=[[L('الصنف','Item'),L('الكود','SKU'),L('التصنيف','Category'),L('الوحدة','Unit'),L('سعر الشراء','Cost'),L('سعر البيع','Price'),L('المتاح','Qty'),L('حد التنبيه','Min'),L('قيمة التكلفة','Cost value'),L('قيمة البيع','Sale value')]];
  db.products.forEach(p=>rows.push([p.name,p.sku||'',p.cat||'',p.unit||'',p.cost,p.price,p.qty,p.min,p.cost*p.qty,p.price*p.qty]));
  downloadCSV('inventory-'+today()+'.csv',rows);}
function addToCart(pid){const p=findProduct(pid);if(!p||p.qty<=0)return toast(L('غير متاح','Out of stock'),'err');
  const ex=cart.find(c=>c.pid===pid);if(ex){if(ex.qty>=p.qty)return toast(L('أقصى كمية','Max qty'),'err');ex.qty++;}else cart.push({pid,qty:1});renderCart();}
function cartQty(pid,d){const c=cart.find(x=>x.pid===pid);if(!c)return;const p=findProduct(pid);c.qty+=d;if(c.qty<=0)cart=cart.filter(x=>x.pid!==pid);else if(c.qty>p.qty){c.qty=p.qty;toast(L('أقصى كمية','Max qty'),'err');}renderCart();}
function renderCart(){const items=document.getElementById('cartItems'),foot=document.getElementById('cartFoot');if(!items)return;
  if(!cart.length){items.innerHTML=`<div class="empty"><span class="big">🛒</span>${L('اضغط صنف لإضافته','Tap an item to add')}</div>`;foot.innerHTML='';return;}
  items.innerHTML=cart.map(c=>{const p=findProduct(c.pid);return `<div class="cart-row"><div style="flex:1"><div class="ci-n">${esc(p.name)}</div><div class="ci-p">${money(p.price)} × ${c.qty} = ${money(p.price*c.qty)}</div></div><div class="qstep"><button onclick="cartQty('${c.pid}',-1)">−</button><span>${c.qty}</span><button onclick="cartQty('${c.pid}',1)">+</button></div></div>`}).join('');
  const total=cart.reduce((s,c)=>s+findProduct(c.pid).price*c.qty,0);
  const disc=+document.getElementById('posDisc')?.value||0;const discAmt=Math.min(disc,total);const finalTotal=total-discAmt;
  foot.innerHTML=`<div class="tt"><span>${L('الإجمالي','Subtotal')}</span><span>${money(total)}</span></div>`+
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><label style="font-size:12px;color:var(--muted);white-space:nowrap">${L('خصم','Disc')} ${cur()}</label><input type="number" id="posDisc" min="0" max="${total}" step="0.5" value="${disc}" oninput="renderCart()" style="width:90px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink)"></div>`+
    (discAmt>0?`<div class="tt" style="font-size:14px;color:var(--danger)"><span>− ${L('خصم','Discount')}</span><span>${money(discAmt)}</span></div>`:'')+ 
    `<div class="tt" style="color:var(--primary-d)"><span>${L('الإجمالي','Total')}</span><span>${money(finalTotal)}</span></div>`+
    `<button class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:13px" onclick="posCheckout()">💳 ${L('إتمام البيع','Checkout')}</button>`;}
function posCheckout(){if(!cart.length)return;const cid=document.getElementById('posCustomer').value;
  const disc=+document.getElementById('posDisc')?.value||0;
  const items=cart.map(c=>{const p=findProduct(c.pid);return {pid:p.id,name:p.name,qty:c.qty,price:p.price,cost:p.cost};});
  const sub=items.reduce((s,i)=>s+i.price*i.qty,0),cost=items.reduce((s,i)=>s+i.cost*i.qty,0);
  const discAmt=Math.min(disc,sub);const total=sub-discAmt;const party=cid?findCustomer(cid):null;
  const rec={id:uid(),no:db.seq.sale++,date:today(),customerId:cid,customerName:party?party.name:'',items,sub,disc:discAmt,vat:0,vatP:0,total,cost,profit:total-cost,paidAmount:total,dueAmount:0,payMethod:'cash',branch:activeBranch()};
  db.sales.push(rec);items.forEach(it=>moveStock(it.pid,-it.qty,'out',`بيع #${rec.no}`,rec.id));addCash('in',total,`POS #${rec.no}`,rec.id);
  if(party)awardPoints(party,total);bumpOps();
  save();toast(L('تم البيع','Sold')+' #'+rec.no);cart=[];renderCart();renderPosGrid(document.getElementById('posSearch').value||'');viewInvoice('sale',rec.id);}
function awardPoints(party,amount){if(!db.settings.loyaltyOn||!party)return;const pts=Math.floor(amount/100*db.settings.loyaltyRate);if(pts>0){party.points=(party.points||0)+pts;}}

}

function addCatFromModal(){
  const inp=document.getElementById('newCatInput');
  const name=inp.value.trim();
  if(!name)return toast(L('اكتب الاسم','Enter name'),'err');
  if(getAllCats().includes(name))return toast(L('موجود بالفعل','Already exists'),'err');
  db.categories.push({id:uid(),name});
  save();inp.value='';
  document.getElementById('catList').innerHTML=renderCatListHTML(getAllCats());
  toast(L('تمت الإضافة','Added'));}

function delCat(name){
  const count=db.products.filter(p=>p.cat===name).length;
  if(count>0&&!confirm(L(`سيتم إزالة التصنيف من ${count} صنف. متابعة؟`,`Will remove category from ${count} items. Continue?`)))return;
  db.categories=db.categories.filter(c=>c.name!==name);
  db.products.forEach(p=>{if(p.cat===name)p.cat='';});
  save();
  document.getElementById('catList').innerHTML=renderCatListHTML(getAllCats());
  toast(L('تم الحذف','Deleted'));}

function calcProdMargin(){
  const cost=+document.getElementById('f_cost').value||0;
  const price=+document.getElementById('f_price').value||0;
  const el=document.getElementById('marginPreview');if(!el)return;
  if(cost>0&&price>0){
    const margin=Math.round((price-cost)/cost*100);
    const profit=price-cost;
    el.innerHTML=`<div class="hint">📊 ${L('هامش الربح','Margin')}: <b style="color:${margin>=30?'var(--ok)':margin>=15?'var(--gold)':'var(--danger)'}">${margin}%</b> — ${L('ربح الوحدة','Unit profit')}: <b>${money(profit)}</b></div>`;
  }else el.innerHTML='';}

function saveProduct(id){
  const g=x=>document.getElementById(x).value;
  const name=g('f_name').trim();if(!name)return toast(L('اكتب الاسم','Enter name'),'err');
  let cat=g('f_cat');
  if(cat==='__new__'){cat=g('f_cat_new').trim();if(cat&&!getAllCats().includes(cat))db.categories.push({id:uid(),name:cat});}
  const d={name,sku:g('f_sku').trim(),cat,unit:g('f_unit').trim()||L('قطعة','pc'),cost:+g('f_cost')||0,price:+g('f_price')||0,min:+g('f_min')||0,wholeSalePrice:+g('f_wholesale')||0,notes:g('f_notes').trim()};
  if(id)Object.assign(findProduct(id),d);
  else{const qty=+g('f_qty')||0;const np={id:uid(),...d,qty:0};db.products.push(np);if(qty)moveStock(np.id,qty,'in',L('رصيد افتتاحي','Opening stock'));}
  save();closeModal();views.products();toast(L('تم الحفظ','Saved'));}

function delProduct(id){if(!confirm(L('حذف الصنف؟','Delete item?')))return;db.products=db.products.filter(p=>p.id!==id);save();views.products();toast(L('تم الحذف','Deleted'));}

function stockCountForm(){openModal(`<div class="modal-h"><h3>📋 ${L('جرد وتسوية المخزون','Stock Count')}</h3><button class="x" onclick="closeModal()">×</button></div>

function applyStockCount(){let n=0;db.products.forEach(p=>{const v=+document.getElementById('cnt_'+p.id).value;if(v!==p.qty){moveStock(p.id,v-p.qty,'adjust',L('تسوية جرد','Stock adjustment'));n++;}});save();closeModal();views.products();toast(n?`${n} ${L('صنف','items')}`:L('لا تغييرات','No changes'));}

function stockHistory(id){const p=findProduct(id);const moves=db.stockMoves.filter(m=>m.pid===id).reverse();

    ${[...db.purchases].reverse().map(s=>`<tr><td><b>#${s.no}</b></td><td>${s.date}</td><td>${esc(s.supplierName)||'—'}</td><td class="t-num">${money(s.total)}</td><td>${payBadge(s)}</td><td><div class="row-acts"><button class="iconbtn" onclick="viewInvoice('purchase','${s.id}')">👁️</button>${(s.dueAmount||0)>0?`<button class="iconbtn" title="${L('سداد','Pay')}" onclick="collectInvoice('purchase','${s.id}')">💵</button>`:''}<button class="iconbtn" title="${L('مرتجع','Return')}" onclick="returnForm('purchase','${s.id}')">↩️</button><button class="iconbtn del" onclick="delPurchase('${s.id}')">🗑️</button></div></td></tr>`).join('')}</tbody></table>`:`<div class="empty"><span class="big">📦</span>${L('لا توجد فواتير شراء','No purchases')}</div>`}</div></div>`;};

/* Invoice builder */
let invLines=[],invKind='sale';
function invoiceForm(kind,fromQuote,preSupplierId){invKind=kind;invLines=[{pid:'',qty:1,price:0}];
  const isSale=kind!=='purchase';const parties=isSale?db.customers:db.suppliers;let preCust=preSupplierId||'';
  if(fromQuote){const qd=db.quotes.find(x=>x.id===fromQuote);invLines=qd.items.map(it=>({pid:it.pid,qty:it.qty,price:it.price}));preCust=qd.customerId||'';}
  const payRow=kind==='quote'?'':`<div class="grid3"><div class="field"><label>${L('طريقة الدفع','Payment')}</label><select id="inv_pm" onchange="togglePaid()"><option value="cash">${L('نقدي بالكامل','Full cash')}</option><option value="partial">${L('دفع جزئي','Partial')}</option><option value="credit">${L('آجل بالكامل','Full credit')}</option></select></div>
    <div class="field" id="paidWrap" style="display:none"><label>${L('المدفوع الآن','Paid now')}</label><input id="inv_paid" type="number" value="0" oninput="calcInv()"></div>
    <div class="field"><label>&nbsp;</label><div style="padding:9px 0;color:var(--muted);font-size:12px" id="dueHint"></div></div></div>`;
  openModal(`<div class="modal-h"><h3>${kind==='quote'?'📝 '+L('عرض سعر','Quotation'):(isSale?'🧾 '+L('فاتورة بيع','Sale Invoice'):'📦 '+L('فاتورة شراء','Purchase Invoice'))}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b"><div class="grid3"><div class="field"><label>${isSale?L('العميل','Customer'):L('المورد','Supplier')}</label>
    <select id="inv_party"><option value="">${isSale?L('عميل نقدي','Cash'):L('بدون مورد','None')}</option>${parties.map(p=>`<option value="${p.id}" ${p.id===preCust?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
    <div class="field"><label>${L('التاريخ','Date')}</label><input id="inv_date" type="date" value="${today()}"></div><div class="field"></div></div>
    ${db.products.length?'':`<div class="hint">⚠️ ${L('أضف أصنافًا أولًا','Add items first')}</div>`}
    <table class="inv-items"><thead><tr><th style="width:42%">${L('الصنف','Item')}</th><th>${L('كمية','Qty')}</th><th>${L('سعر','Price')}</th><th>${L('إجمالي','Total')}</th><th></th></tr></thead><tbody id="invBody"></tbody></table>
    <button class="btn btn-ghost btn-sm" style="margin:10px 0" onclick="addInvLine()">+ ${L('إضافة صنف','Add item')}</button>
    <div class="grid2" style="margin-top:8px"><div class="field"><label>${L('خصم','Discount')} (${cur()})</label><input id="inv_disc" type="number" value="0" oninput="calcInv()"></div>
      <div class="field"><label>${L('ضريبة','Tax')} %</label><input id="inv_vat" type="number" value="${isSale||kind==='quote'?db.settings.vat:0}" oninput="calcInv()"></div></div>
    ${payRow}<div class="inv-totals" id="invTotals"></div></div>
  <div class="modal-f"><button class="btn ${isSale?'btn-primary':'btn-accent'}" onclick="saveInvoice()">${kind==='quote'?L('حفظ العرض','Save quote'):L('حفظ الفاتورة','Save invoice')}</button><button class="btn btn-ghost" onclick="closeModal()">${L('إلغاء','Cancel')}</button></div>`,true);
  renderInvLines();calcInv();}
function renderInvLines(){document.getElementById('invBody').innerHTML=invLines.map((ln,i)=>`<tr><td><select onchange="setLineProduct(${i},this.value)"><option value="">— ${L('اختر','Select')} —</option>${db.products.map(p=>`<option value="${p.id}" ${ln.pid===p.id?'selected':''}>${esc(p.name)} (${p.qty})</option>`).join('')}</select></td>
  <td><input type="number" min="1" value="${ln.qty}" oninput="invLines[${i}].qty=+this.value;calcInv()"></td><td><input type="number" value="${ln.price}" oninput="invLines[${i}].price=+this.value;calcInv()"></td><td class="t-num">${money(ln.qty*ln.price)}</td><td><button class="iconbtn del" onclick="rmInvLine(${i})">×</button></td></tr>`).join('');}
function setLineProduct(i,pid){invLines[i].pid=pid;const p=findProduct(pid);if(p)invLines[i].price=invKind==='purchase'?p.cost:p.price;renderInvLines();calcInv();}
function addInvLine(){invLines.push({pid:'',qty:1,price:0});renderInvLines();calcInv();}
function rmInvLine(i){invLines.splice(i,1);if(!invLines.length)invLines.push({pid:'',qty:1,price:0});renderInvLines();calcInv();}
function togglePaid(){document.getElementById('paidWrap').style.display=document.getElementById('inv_pm').value==='partial'?'block':'none';calcInv();}
function calcInv(){const sub=invLines.reduce((s,l)=>s+l.qty*l.price,0);const disc=+document.getElementById('inv_disc').value||0,vatP=+document.getElementById('inv_vat').value||0;
  const afterDisc=Math.max(0,sub-disc),vat=afterDisc*vatP/100,total=afterDisc+vat;
  const pmEl=document.getElementById('inv_pm');if(pmEl){const pm=pmEl.value;let paid=pm==='cash'?total:pm==='credit'?0:(+document.getElementById('inv_paid').value||0);const due=Math.max(0,total-paid);const dh=document.getElementById('dueHint');if(dh)dh.textContent=due>0?`${L('المتبقي','Due')}: ${money(due)}`:L('مدفوعة بالكامل','Fully paid');}
  document.getElementById('invTotals').innerHTML=`<div class="row"><span>${L('الإجمالي الفرعي','Subtotal')}</span><span class="t-num">${money(sub)}</span></div><div class="row"><span>${L('الخصم','Discount')}</span><span class="t-num">- ${money(disc)}</span></div><div class="row"><span>${L('الضريبة','Tax')} (${vatP}%)</span><span class="t-num">${money(vat)}</span></div><div class="row grand"><span>${L('الإجمالي','Total')}</span><span>${money(total)}</span></div>`;
  document.getElementById('invBody').querySelectorAll('tr').forEach((tr,i)=>{if(invLines[i])tr.children[3].textContent=money(invLines[i].qty*invLines[i].price);});
  return {sub,disc,vat,vatP,total};}
function saveInvoice(){const lines=invLines.filter(l=>l.pid&&l.qty>0);if(!lines.length)return toast(L('أضف صنفًا','Add an item'),'err');
  const T=calcInv();const partyId=document.getElementById('inv_party').value;const date=document.getElementById('inv_date').value||today();
  const items=lines.map(l=>{const p=findProduct(l.pid);return {pid:p.id,name:p.name,qty:l.qty,price:l.price,cost:p.cost};});
  if(invKind==='quote'){const party=partyId?findCustomer(partyId):null;db.quotes.push({id:uid(),no:db.seq.quote++,date,customerId:partyId,customerName:party?party.name:'',items,sub:T.sub,disc:T.disc,vat:T.vat,vatP:T.vatP,total:T.total,status:'open'});save();closeModal();go('quotes');toast(L('تم حفظ العرض','Quote saved'));return;}
  const pm=document.getElementById('inv_pm').value;const paid=pm==='cash'?T.total:pm==='credit'?0:Math.min(T.total,+document.getElementById('inv_paid').value||0);const due=Math.max(0,T.total-paid);
  if(invKind==='sale'){for(const l of lines){const p=findProduct(l.pid);if(l.qty>p.qty)return toast(`${L('الكمية أكبر من المتاح','Qty exceeds stock')}: ${p.name} (${p.qty})`,'err');}
    const cost=items.reduce((s,i)=>s+i.cost*i.qty,0);const party=partyId?findCustomer(partyId):null;if(due>0&&!party)return toast(L('اختر عميلًا للآجل','Select a customer for credit'),'err');
    if(due>0&&party&&party.creditLimit>0&&(party.balance+due)>party.creditLimit)return toast(`${L('تجاوز حد الائتمان','Credit limit exceeded')} (${money(party.creditLimit)})`,'err');
    const rec={id:uid(),no:db.seq.sale++,date,customerId:partyId,customerName:party?party.name:'',items,sub:T.sub,disc:T.disc,vat:T.vat,vatP:T.vatP,total:T.total,cost,profit:T.total-T.vat-cost,paidAmount:paid,dueAmount:due,payMethod:pm,branch:activeBranch()};
    db.sales.push(rec);items.forEach(it=>moveStock(it.pid,-it.qty,'out',`بيع #${rec.no}`,rec.id));addCash('in',paid,`بيع #${rec.no}`,rec.id);if(due>0&&party)party.balance+=due;
    if(party)awardPoints(party,T.total);bumpOps();
    save();closeModal();go('sales');toast(L('تم حفظ الفاتورة','Invoice saved'));viewInvoice('sale',rec.id);
  }else{const party=partyId?findSupplier(partyId):null;if(due>0&&!party)return toast(L('اختر موردًا للآجل','Select a supplier for credit'),'err');
    const rec={id:uid(),no:db.seq.purchase++,date,supplierId:partyId,supplierName:party?party.name:'',items,sub:T.sub,disc:T.disc,vat:T.vat,vatP:T.vatP,total:T.total,paidAmount:paid,dueAmount:due,payMethod:pm,branch:activeBranch()};
    db.purchases.push(rec);items.forEach(it=>{const p=findProduct(it.pid);if(p){moveStock(it.pid,it.qty,'in',`شراء #${rec.no}`,rec.id);p.cost=it.price;}});addCash('out',paid,`شراء #${rec.no}`,rec.id);if(due>0&&party)party.balance+=due;bumpOps();
    save();closeModal();go('purchases');toast(L('تم حفظ الفاتورة','Invoice saved'));}}
function collectInvoice(kind,id){const isSale=kind==='sale';const s=(isSale?db.sales:db.purchases).find(x=>x.id===id);
  const amt=prompt(`${isSale?L('تحصيل','Collect'):L('سداد','Pay')} #${s.no} — ${L('المتبقي','Due')} ${money(s.dueAmount)}`,s.dueAmount);if(amt===null)return;const v=Math.min(+amt||0,s.dueAmount);if(v<=0)return;
  s.dueAmount-=v;s.paidAmount=(s.paidAmount||0)+v;
  if(isSale){addCash('in',v,`تحصيل #${s.no}`,id);const c=findCustomer(s.customerId);if(c)c.balance-=v;}else{addCash('out',v,`سداد #${s.no}`,id);const sp=findSupplier(s.supplierId);if(sp)sp.balance-=v;}
  save();go(isSale?'sales':'purchases');toast(L('تم تسجيل الدفعة','Payment recorded'));}
function viewInvoice(kind,id){const isSale=kind==='sale';const s=(isSale?db.sales:db.purchases).find(x=>x.id===id);const st=db.settings;
  openModal(`<div class="modal-h no-print"><h3>${L('فاتورة','Invoice')} #${s.no}</h3><button class="x" onclick="closeModal()">×</button></div>

function delSale(id){if(!confirm(L('حذف الفاتورة؟','Delete invoice?')))return;const s=db.sales.find(x=>x.id===id);s.items.forEach(it=>moveStock(it.pid,it.qty,'in',`إلغاء بيع #${s.no}`,id));addCash('out',s.paidAmount||0,`إلغاء بيع #${s.no}`,id);if((s.dueAmount||0)>0&&s.customerId){const c=findCustomer(s.customerId);if(c)c.balance-=s.dueAmount;}db.sales=db.sales.filter(x=>x.id!==id);save();go('sales');toast(L('تم الحذف','Deleted'));}
function delPurchase(id){if(!confirm(L('حذف الفاتورة؟','Delete invoice?')))return;const s=db.purchases.find(x=>x.id===id);s.items.forEach(it=>moveStock(it.pid,-it.qty,'out',`إلغاء شراء #${s.no}`,id));addCash('in',s.paidAmount||0,`إلغاء شراء #${s.no}`,id);if((s.dueAmount||0)>0&&s.supplierId){const sp=findSupplier(s.supplierId);if(sp)sp.balance-=s.dueAmount;}db.purchases=db.purchases.filter(x=>x.id!==id);save();go('purchases');toast(L('تم الحذف','Deleted'));}

  ${retLines.map((it,i)=>`<tr><td>${esc(it.name)}</td><td class="t-num">${it.qty}</td><td class="t-num">${money(it.price)}</td><td><input type="number" min="0" max="${it.qty}" value="0" oninput="retLines[${i}].ret=Math.min(${it.qty},Math.max(0,+this.value));calcRet()"></td></tr>`).join('')}</tbody></table>

function calcRet(){const total=retLines.reduce((s,l)=>s+l.ret*l.price,0);document.getElementById('retTotals').innerHTML=`<div class="row grand"><span>${L('قيمة المرتجع','Return value')}</span><span>${money(total)}</span></div>`;}
function saveReturn(){const isSale=retCtx.kind==='sale';const lines=retLines.filter(l=>l.ret>0);if(!lines.length)return toast(L('حدّد كمية','Set a quantity'),'err');
  const total=lines.reduce((s,l)=>s+l.ret*l.price,0),cost=lines.reduce((s,l)=>s+l.ret*l.cost,0);const s=retCtx.s;
  const rec={id:uid(),no:db.seq.ret++,date:today(),type:retCtx.kind,refNo:s.no,refId:s.id,partyName:(isSale?s.customerName:s.supplierName)||L('نقدي','Cash'),items:lines.map(l=>({name:l.name,qty:l.ret,price:l.price})),total,cost};
  db.returns.push(rec);
  if(isSale){lines.forEach(l=>moveStock(l.pid,l.ret,'in',`مرتجع بيع #${rec.no}`,rec.id));if((s.dueAmount||0)>0&&s.customerId){const c=findCustomer(s.customerId);const cut=Math.min(s.dueAmount,total);s.dueAmount-=cut;if(c)c.balance-=cut;addCash('out',total-cut,`رد مرتجع #${rec.no}`,rec.id);}else addCash('out',total,`رد مرتجع #${rec.no}`,rec.id);}
  else{lines.forEach(l=>moveStock(l.pid,-l.ret,'out',`مرتجع شراء #${rec.no}`,rec.id));if((s.dueAmount||0)>0&&s.supplierId){const sp=findSupplier(s.supplierId);const cut=Math.min(s.dueAmount,total);s.dueAmount-=cut;if(sp)sp.balance-=cut;addCash('in',total-cut,`استرداد #${rec.no}`,rec.id);}else addCash('in',total,`استرداد #${rec.no}`,rec.id);}
  save();closeModal();go('returns');toast(L('تم تسجيل المرتجع','Return recorded'));}

    ${db.customers.map(c=>{const overLimit=c.creditLimit>0&&c.balance>=c.creditLimit;return `<tr><td><b>${esc(c.name)}</b>${c.creditLimit>0?`<div style="font-size:10px;color:var(--muted)">${L('حد','Limit')}: ${money(c.creditLimit)}</div>`:''}</td><td>${esc(c.phone)||'—'}</td><td class="t-num">${money(Math.abs(c.balance))}</td>${loyOn?`<td class="t-num">${c.points||0}${(c.points||0)>0?` <button class="btn btn-ghost btn-sm" onclick="redeemPoints('${c.id}')">${L('استبدال','Redeem')}</button>`:''}</td>`:''}<td>${overLimit?`<span class="badge danger">${L('تخطى الحد','Over limit')}</span>`:c.balance>0?`<span class="badge warn">${L('مدين لك','Owes you')}</span>`:c.balance<0?`<span class="badge info">${L('دفع مقدمًا','Prepaid')}</span>`:`<span class="badge ok">${L('صفر','Zero')}</span>`}</td><td><div class="row-acts"><button class="iconbtn" title="${L('كشف حساب','Statement')}" onclick="statement('customer','${c.id}')">📄</button>${c.balance>0?`<button class="btn btn-ghost btn-sm" onclick="collect('${c.id}')">${L('تحصيل','Collect')}</button>`:''}<button class="iconbtn" onclick="partyForm('customer','${c.id}')">✏️</button><button class="iconbtn del" onclick="delParty('customer','${c.id}')">🗑️</button></div></td></tr>`}).join('')}</tbody></table>`:`<div class="empty"><span class="big">👤</span>${L('لا يوجد عملاء','No customers')}</div>`}</div></div>`;};

function redeemPoints(id){const c=findCustomer(id);const pts=c.points||0;if(pts<=0)return;const val=pts*db.settings.loyaltyValue;

  c.points=0;c.balance-=val;addCash('out',0,`استبدال نقاط ${c.name}`);save();views.customers();toast(L('تم الاستبدال','Redeemed'));}

views.suppliers=()=>{document.getElementById('topActions').innerHTML=`<button class="btn btn-accent" onclick="partyForm('supplier')">+ ${L('مورد','Supplier')}</button>`;
  const due=db.suppliers.reduce((s,c)=>s+Math.max(0,c.balance),0);
  document.getElementById('content').innerHTML=`<div class="cards" style="grid-template-columns:repeat(2,1fr)"><div class="card kpi-2"><div class="lbl">${L('عدد الموردين','Suppliers')}</div><div class="val">${db.suppliers.length}</div></div><div class="card kpi-4"><div class="lbl">${L('المستحق عليك','Payables')}</div><div class="val" style="font-size:22px;color:var(--danger)">${money(due)}</div></div></div>
    <div class="panel"><div class="panel-h"><h3>${L('الموردون','Suppliers')}</h3></div><div class="panel-b">
    ${db.suppliers.length?`<table><thead><tr><th>${L('الاسم','Name')}</th><th>${L('الهاتف','Phone')}</th><th>${L('الرصيد','Balance')}</th><th>${L('الحالة','Status')}</th><th></th></tr></thead><tbody>
    ${db.suppliers.map(c=>`<tr><td><b>${esc(c.name)}</b></td><td>${esc(c.phone)||'—'}</td><td class="t-num">${money(Math.abs(c.balance))}</td><td>${c.balance>0?`<span class="badge danger">${L('مستحق عليك','You owe')}</span>`:`<span class="badge ok">${L('مسدد','Settled')}</span>`}</td><td><div class="row-acts"><button class="iconbtn" onclick="statement('supplier','${c.id}')">📄</button>${c.balance>0?`<button class="btn btn-ghost btn-sm" onclick="payy('${c.id}')">${L('سداد','Pay')}</button>`:''}<button class="iconbtn" onclick="partyForm('supplier','${c.id}')">✏️</button><button class="iconbtn del" onclick="delParty('supplier','${c.id}')">🗑️</button></div></td></tr>`).join('')}</tbody></table>`:`<div class="empty"><span class="big">🚚</span>${L('لا يوجد موردون','No suppliers')}</div>`}</div></div>`;};
function payy(id){const c=findSupplier(id);const amt=prompt(`${L('سداد لـ','Pay to')} ${c.name} (${money(c.balance)})`,c.balance);if(amt===null)return;const v=+amt;if(!v||v<=0)return;c.balance-=v;addCash('out',v,`سداد ${c.name}`);save();views.suppliers();toast(L('تم السداد','Paid'));}
function partyForm(kind,id){const isC=kind==='customer';const list=isC?db.customers:db.suppliers;const p=id?list.find(x=>x.id===id):{name:'',phone:'',address:'',balance:0,points:0,creditLimit:0};
  openModal(`<div class="modal-h"><h3>${id?L('تعديل','Edit'):L('إضافة','Add')} ${isC?L('عميل','Customer'):L('مورد','Supplier')}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b"><div class="field"><label>${L('الاسم','Name')}</label><input id="p_name" value="${esc(p.name)}"></div><div class="grid2"><div class="field"><label>${L('الهاتف','Phone')}</label><input id="p_phone" value="${esc(p.phone)}"></div><div class="field"><label>${L('العنوان','Address')}</label><input id="p_addr" value="${esc(p.address)}"></div></div>
  <div class="grid2"><div class="field"><label>${L('رصيد افتتاحي','Opening balance')} (${isC?L('مستحق لك','owes you'):L('مستحق عليك','you owe')})</label><input id="p_bal" type="number" value="${p.balance||0}"></div>
  ${isC?`<div class="field"><label>${L('حد الائتمان (0 = بدون حد)','Credit limit (0 = none)')}</label><input id="p_climit" type="number" value="${p.creditLimit||0}"></div>`:'<div class="field"></div>'}</div>
  ${isC&&id?`<div class="hint">⭐ ${L('نقاط الولاء الحالية','Loyalty points')}: <b>${p.points||0}</b></div>`:''}</div>
  <div class="modal-f"><button class="btn btn-primary" onclick="saveParty('${kind}','${id||''}')">${L('حفظ','Save')}</button><button class="btn btn-ghost" onclick="closeModal()">${L('إلغاء','Cancel')}</button></div>`);}
function saveParty(kind,id){const name=document.getElementById('p_name').value.trim();if(!name)return toast(L('اكتب الاسم','Enter name'),'err');
  const d={name,phone:document.getElementById('p_phone').value.trim(),address:document.getElementById('p_addr').value.trim(),balance:+document.getElementById('p_bal').value||0};
  if(kind==='customer')d.creditLimit=+document.getElementById('p_climit').value||0;
  const list=kind==='customer'?db.customers:db.suppliers;if(id)Object.assign(list.find(x=>x.id===id),d);else list.push({id:uid(),...d,points:0});save();closeModal();kind==='customer'?views.customers():views.suppliers();toast(L('تم الحفظ','Saved'));}
function delParty(kind,id){if(!confirm(L('حذف؟','Delete?')))return;if(kind==='customer')db.customers=db.customers.filter(x=>x.id!==id);else db.suppliers=db.suppliers.filter(x=>x.id!==id);save();kind==='customer'?views.customers():views.suppliers();toast(L('تم الحذف','Deleted'));}
function statement(kind,id){const isC=kind==='customer';const p=(isC?db.customers:db.suppliers).find(x=>x.id===id);let rows=[];
  if(isC)db.sales.filter(s=>s.customerId===id).forEach(s=>rows.push({date:s.date,desc:`${L('فاتورة بيع','Sale')} #${s.no}`,debit:s.total,credit:s.paidAmount||0}));
  else db.purchases.filter(s=>s.supplierId===id).forEach(s=>rows.push({date:s.date,desc:`${L('فاتورة شراء','Purchase')} #${s.no}`,debit:s.paidAmount||0,credit:s.total}));
  rows.sort((a,b)=>a.date<b.date?-1:1);let bal=0;const body=rows.map(r=>{bal+=(r.debit-r.credit);return `<tr><td>${r.date}</td><td>${r.desc}</td><td class="t-num">${money(r.debit)}</td><td class="t-num">${money(r.credit)}</td><td class="t-num">${money(bal)}</td></tr>`}).join('');
  openModal(`<div class="modal-h no-print"><h3>📄 ${L('كشف حساب','Statement')}: ${esc(p.name)}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b" id="printArea"><div style="border-bottom:2px solid var(--primary);padding-bottom:10px;margin-bottom:14px"><h2 style="color:var(--primary-d)">${esc(db.settings.company)}</h2><div style="font-size:13px">${L('كشف حساب','Statement')}: <b>${esc(p.name)}</b> ${p.phone?'• '+esc(p.phone):''}</div></div>
  ${rows.length?`<table><thead><tr><th>${L('التاريخ','Date')}</th><th>${L('البيان','Description')}</th><th>${isC?L('عليه','Debit'):L('له','Credit')}</th><th>${isC?L('له','Credit'):L('عليه','Debit')}</th><th>${L('الرصيد','Balance')}</th></tr></thead><tbody>${body}</tbody></table>`:`<div class="empty">${L('لا حركات','No transactions')}</div>`}
  <div class="inv-totals" style="margin-top:14px"><div class="row grand"><span>${L('الرصيد الحالي','Current balance')}</span><span>${money(Math.abs(p.balance))}</span></div></div></div>
  <div class="modal-f"><button class="btn btn-ghost" onclick="window.print()">🖨️ ${L('طباعة','Print')}</button><button class="btn btn-primary" onclick="closeModal()">${L('إغلاق','Close')}</button></div>`,true);}

/* Treasury */
views.treasury=()=>{document.getElementById('topActions').innerHTML=`<button class="btn btn-primary" onclick="cashForm('in')">+ ${L('إيداع','Deposit')}</button><button class="btn btn-accent" onclick="cashForm('out')">- ${L('صرف','Withdraw')}</button>`;
  const inT=db.cash.filter(c=>c.type==='in').reduce((s,c)=>s+c.amount,0),outT=db.cash.filter(c=>c.type==='out').reduce((s,c)=>s+c.amount,0);
  document.getElementById('content').innerHTML=`<div class="cards" style="grid-template-columns:repeat(3,1fr)"><div class="card kpi-1"><div class="lbl">${L('الرصيد الحالي','Balance')}</div><div class="val">${money(cashBalance())}</div></div><div class="card kpi-2"><div class="lbl">${L('إجمالي الداخل','Total In')}</div><div class="val" style="font-size:22px;color:var(--ok)">${money(inT)}</div></div><div class="card kpi-4"><div class="lbl">${L('إجمالي الخارج','Total Out')}</div><div class="val" style="font-size:22px;color:var(--danger)">${money(outT)}</div></div></div>
    <div class="panel"><div class="panel-h"><h3>${L('حركة الخزينة','Cash Movements')}</h3></div><div class="panel-b">
    ${db.cash.length?`<table><thead><tr><th>${L('التاريخ','Date')}</th><th>${L('البيان','Description')}</th><th>${L('داخل','In')}</th><th>${L('خارج','Out')}</th></tr></thead><tbody>
    ${[...db.cash].reverse().map(c=>`<tr><td>${c.date}</td><td>${esc(c.note)}</td><td class="t-num" style="color:var(--ok)">${c.type==='in'?money(c.amount):'—'}</td><td class="t-num" style="color:var(--danger)">${c.type==='out'?money(c.amount):'—'}</td></tr>`).join('')}</tbody></table>`:`<div class="empty"><span class="big">💵</span>${L('لا حركات','No movements')}</div>`}</div></div>`;};
function cashForm(type){openModal(`<div class="modal-h"><h3>${type==='in'?L('إيداع نقدي','Deposit'):L('صرف نقدي','Withdraw')}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b"><div class="field"><label>${L('المبلغ','Amount')}</label><input id="c_amt" type="number"></div><div class="field"><label>${L('البيان','Description')}</label><input id="c_note"></div></div>
  <div class="modal-f"><button class="btn btn-primary" onclick="saveCash('${type}')">${L('حفظ','Save')}</button><button class="btn btn-ghost" onclick="closeModal()">${L('إلغاء','Cancel')}</button></div>`);}
function saveCash(type){const amt=+document.getElementById('c_amt').value;const note=document.getElementById('c_note').value.trim()||(type==='in'?L('إيداع','Deposit'):L('صرف','Withdraw'));if(!amt||amt<=0)return toast(L('اكتب مبلغًا','Enter amount'),'err');addCash(type,amt,note);save();closeModal();views.treasury();toast(L('تم التسجيل','Recorded'));}

/* Expenses */
views.expenses=()=>{document.getElementById('topActions').innerHTML=`<button class="btn btn-accent" onclick="expenseForm()">+ ${L('مصروف','Expense')}</button>`;
  const month=today().slice(0,7),monthExp=db.expenses.filter(e=>e.date.slice(0,7)===month).reduce((s,e)=>s+e.amount,0),totalExp=db.expenses.reduce((s,e)=>s+e.amount,0);
  const byCat={};db.expenses.forEach(e=>byCat[e.cat]=(byCat[e.cat]||0)+e.amount);
  document.getElementById('content').innerHTML=`<div class="cards" style="grid-template-columns:repeat(2,1fr)"><div class="card kpi-2"><div class="lbl">${L('مصروفات الشهر','Month Expenses')}</div><div class="val" style="font-size:22px;color:var(--accent)">${money(monthExp)}</div></div><div class="card kpi-4"><div class="lbl">${L('الإجمالي','Total')}</div><div class="val" style="font-size:22px">${money(totalExp)}</div></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:22px"><div class="panel"><div class="panel-h"><h3>${L('سجل المصروفات','Expenses Log')}</h3></div><div class="panel-b">
    ${db.expenses.length?`<table><thead><tr><th>${L('التاريخ','Date')}</th><th>${L('التصنيف','Category')}</th><th>${L('البيان','Note')}</th><th>${L('المبلغ','Amount')}</th><th></th></tr></thead><tbody>${[...db.expenses].reverse().map(e=>`<tr><td>${e.date}</td><td><span class="badge muted">${esc(e.cat)}</span></td><td>${esc(e.note)||'—'}</td><td class="t-num">${money(e.amount)}</td><td><button class="iconbtn del" onclick="delExpense('${e.id}')">🗑️</button></td></tr>`).join('')}</tbody></table>`:`<div class="empty"><span class="big">🧮</span>${L('لا مصروفات','No expenses')}</div>`}</div></div>
    <div class="panel"><div class="panel-h"><h3>${L('حسب التصنيف','By Category')}</h3></div><div class="panel-b">${Object.keys(byCat).length?`<table><tbody>${Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<tr><td>${esc(c)}</td><td style="text-align:left"><span class="badge" style="background:var(--accent-soft);color:var(--accent)">${money(v)}</span></td></tr>`).join('')}</tbody></table>`:`<div class="empty">${L('لا بيانات','No data')}</div>`}</div></div></div>`;};
function expenseForm(){openModal(`<div class="modal-h"><h3>${L('مصروف جديد','New Expense')}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b"><div class="grid2"><div class="field"><label>${L('التصنيف','Category')}</label><select id="e_cat">${EXP_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="field"><label>${L('المبلغ','Amount')}</label><input id="e_amt" type="number"></div></div>
    <div class="field"><label>${L('التاريخ','Date')}</label><input id="e_date" type="date" value="${today()}"></div><div class="field"><label>${L('البيان','Note')}</label><input id="e_note"></div>
    <div class="hint">💡 ${L('يُخصم تلقائيًا من الخزينة.','Auto-deducted from treasury.')}</div></div>
  <div class="modal-f"><button class="btn btn-primary" onclick="saveExpense()">${L('حفظ','Save')}</button><button class="btn btn-ghost" onclick="closeModal()">${L('إلغاء','Cancel')}</button></div>`);}
function saveExpense(){const amt=+document.getElementById('e_amt').value;if(!amt||amt<=0)return toast(L('اكتب مبلغًا','Enter amount'),'err');const cat=document.getElementById('e_cat').value,date=document.getElementById('e_date').value||today(),note=document.getElementById('e_note').value.trim();const id=uid();db.expenses.push({id,date,cat,amount:amt,note});addCash('out',amt,`${L('مصروف','Expense')}: ${cat}${note?' - '+note:''}`,id);save();closeModal();views.expenses();toast(L('تم التسجيل','Recorded'));}
function delExpense(id){if(!confirm(L('حذف المصروف؟','Delete expense?')))return;const e=db.expenses.find(x=>x.id===id);addCash('in',e.amount,`${L('إلغاء مصروف','Reverse expense')}: ${e.cat}`,id);db.expenses=db.expenses.filter(x=>x.id!==id);save();views.expenses();toast(L('تم الحذف','Deleted'));}

/* Reports */
let repFrom='',repTo='';
views.reports=()=>{if(!repFrom){const d=new Date();d.setDate(1);repFrom=d.toISOString().slice(0,10);repTo=today();}
  const sales=bf(db.sales).filter(s=>inRange(s.date,repFrom,repTo)),purch=bf(db.purchases).filter(s=>inRange(s.date,repFrom,repTo)),exps=db.expenses.filter(e=>inRange(e.date,repFrom,repTo)),rets=db.returns.filter(r=>inRange(r.date,repFrom,repTo));
  const saleRet=rets.filter(r=>r.type==='sale');
  const revenue=sales.reduce((s,i)=>s+i.total,0)-saleRet.reduce((s,r)=>s+r.total,0);
  const cogs=sales.reduce((s,i)=>s+i.cost,0)-saleRet.reduce((s,r)=>s+r.cost,0);
  const vatColl=sales.reduce((s,i)=>s+i.vat,0),vatPaid=purch.reduce((s,i)=>s+i.vat,0),expTotal=exps.reduce((s,e)=>s+e.amount,0);
  const grossProfit=revenue-vatColl-cogs,netProfit=grossProfit-expTotal;
  const prodProfit={};sales.forEach(s=>s.items.forEach(it=>{prodProfit[it.name]=(prodProfit[it.name]||0)+(it.price-it.cost)*it.qty;}));
  const topP=Object.entries(prodProfit).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const custSales={};sales.forEach(s=>{const n=s.customerName||L('عميل نقدي','Cash');custSales[n]=(custSales[n]||0)+s.total;});
  const topC=Object.entries(custSales).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const months=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
  const mN=L(['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'],['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']);
  const mRev=months.map(m=>bf(db.sales).filter(s=>s.date.slice(0,7)===m).reduce((a,i)=>a+i.total,0)),maxM=Math.max(...mRev,1);
  document.getElementById('content').innerHTML=`<div class="panel"><div class="panel-b pad" style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">
    <div class="field" style="margin:0"><label>${L('من','From')}</label><input type="date" value="${repFrom}" onchange="repFrom=this.value"></div>
    <div class="field" style="margin:0"><label>${L('إلى','To')}</label><input type="date" value="${repTo}" onchange="repTo=this.value"></div>
    <button class="btn btn-primary" onclick="views.reports()">${L('تطبيق','Apply')}</button>
    <button class="btn btn-ghost" onclick="repFrom='';repTo='';views.reports()">${L('الشهر الحالي','This month')}</button>
    <button class="btn btn-ghost no-print" onclick="exportSalesCSV()" style="margin-right:auto">📊 ${L('تصدير Excel','Export Excel')}</button>
    <button class="btn btn-ghost no-print" onclick="window.print()">🖨️ ${L('طباعة','Print')}</button></div></div>
    <div class="cards"><div class="card kpi-1"><div class="lbl">${L('صافي الإيرادات','Net Revenue')}</div><div class="val" style="font-size:21px">${money(revenue)}</div></div><div class="card kpi-3"><div class="lbl">${L('تكلفة البضاعة','COGS')}</div><div class="val" style="font-size:21px;color:var(--gold)">${money(cogs)}</div></div><div class="card kpi-2"><div class="lbl">${L('مجمل الربح','Gross Profit')}</div><div class="val" style="font-size:21px;color:var(--accent)">${money(grossProfit)}</div></div><div class="card kpi-4"><div class="lbl">${L('صافي الربح','Net Profit')}</div><div class="val" style="font-size:21px;color:${netProfit>=0?'var(--ok)':'var(--danger)'}">${money(netProfit)}</div></div></div>
    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:22px"><div class="panel"><div class="panel-h"><h3>${L('الإيرادات الشهرية','Monthly Revenue')}</h3></div><div class="panel-b pad"><div class="bar-chart">${months.map((m,i)=>{const h=Math.round(mRev[i]/maxM*160);return `<div class="bar-col"><div class="bv">${mRev[i]?fmt(mRev[i]):''}</div><div class="bar" style="height:${h}px;background:linear-gradient(180deg,var(--accent),#e0995c)"></div><div class="bl">${mN[+m.slice(5,7)-1]}</div></div>`}).join('')}</div></div></div>
    <div class="panel"><div class="panel-h"><h3>${L('تقرير الضريبة','Tax Report')}</h3></div><div class="panel-b"><table><tbody><tr><td>${L('ضريبة محصّلة','VAT collected')}</td><td class="t-num" style="text-align:left;color:var(--ok)">${money(vatColl)}</td></tr><tr><td>${L('ضريبة مدفوعة','VAT paid')}</td><td class="t-num" style="text-align:left;color:var(--danger)">${money(vatPaid)}</td></tr><tr style="background:var(--primary-soft)"><td><b>${L('صافي الضريبة','Net VAT due')}</b></td><td class="t-num" style="text-align:left;font-weight:800;color:var(--primary-d)">${money(vatColl-vatPaid)}</td></tr></tbody></table></div></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:22px"><div class="panel"><div class="panel-h"><h3>${L('أرباح حسب الصنف','Profit by Item')}</h3></div><div class="panel-b">${topP.length?`<table><tbody>${topP.map(([n,v])=>`<tr><td>${esc(n)}</td><td style="text-align:left"><span class="badge ok">${money(v)}</span></td></tr>`).join('')}</tbody></table>`:`<div class="empty">${L('لا بيانات','No data')}</div>`}</div></div>
    <div class="panel"><div class="panel-h"><h3>${L('أفضل العملاء','Top Customers')}</h3></div><div class="panel-b">${topC.length?`<table><tbody>${topC.map(([n,v])=>`<tr><td>${esc(n)}</td><td style="text-align:left"><span class="badge info">${money(v)}</span></td></tr>`).join('')}</tbody></table>`:`<div class="empty">${L('لا بيانات','No data')}</div>`}</div></div></div>
    <div class="panel"><div class="panel-h"><h3>${L('أرباح حسب التصنيف','Profit by Category')}</h3></div><div class="panel-b">
      ${(()=>{
        const catProfit={};const catRev={};const catCost={};
        sales.forEach(s=>s.items.forEach(it=>{
          const p=findProduct(it.pid);const cat=p?.cat||L('غير مصنف','Uncategorized');
          catRev[cat]=(catRev[cat]||0)+it.price*it.qty;
          catCost[cat]=(catCost[cat]||0)+it.cost*it.qty;
          catProfit[cat]=(catProfit[cat]||0)+(it.price-it.cost)*it.qty;
        }));
        const entries=Object.entries(catProfit).sort((a,b)=>b[1]-a[1]);
        if(!entries.length)return `<div class="empty">${L('لا بيانات','No data')}</div>`;
        return `<table><thead><tr><th>${L('التصنيف','Category')}</th><th>${L('الإيرادات','Revenue')}</th><th>${L('التكلفة','Cost')}</th><th>${L('الربح','Profit')}</th><th>${L('هامش %','Margin%')}</th></tr></thead><tbody>
        ${entries.map(([cat,profit])=>{
          const rev=catRev[cat]||0;const cost=catCost[cat]||0;
          const margin=cost>0?Math.round(profit/cost*100):0;
          return `<tr><td><span class="badge muted">${esc(cat)}</span></td><td class="t-num">${money(rev)}</td><td class="t-num">${money(cost)}</td><td class="t-num" style="color:var(--ok)">${money(profit)}</td><td><b style="color:${margin>=30?'var(--ok)':margin>=15?'var(--gold)':'var(--danger)'}">${margin}%</b></td></tr>`;
        }).join('')}</tbody></table>`;
      })()}
    </div></div>

  sales.forEach(s=>rows.push(['#'+s.no,s.date,branchName(s.branch),s.customerName||L('نقدي','Cash'),s.items.length,s.sub,s.disc,s.vat,s.total,s.paidAmount||0,s.dueAmount||0,s.profit,s.payMethod]));

/* ---- Local snapshots (keep last 5) ---- */
const SNAP_KEY='hesaby_snaps';
async function getSnaps(){try{const r=await window.storage.get(SNAP_KEY);return r&&r.value?JSON.parse(r.value):[];}catch(e){return [];}}
async function makeSnapshot(reason){try{const snaps=await getSnaps();
  snaps.unshift({id:uid(),at:new Date().toISOString(),reason:reason||'manual',sales:db.sales.length,data:JSON.stringify(db)});
  while(snaps.length>5)snaps.pop();
  await window.storage.set(SNAP_KEY,JSON.stringify(snaps));return true;}catch(e){return false;}}
async function snapshotNow(){const ok=await makeSnapshot('manual');toast(ok?L('تم حفظ نسخة داخلية','Snapshot saved'):L('تعذّر الحفظ','Snapshot failed'),ok?'':'err');if(current==='settings')views.settings();}
async function restoreSnapshot(id){const snaps=await getSnaps();const s=snaps.find(x=>x.id===id);if(!s)return;
  if(!confirm(L('سيتم استبدال البيانات الحالية بهذه النسخة. متابعة؟','This replaces current data with the snapshot. Continue?')))return;
  await makeSnapshot('before-restore');db=JSON.parse(s.data);migrate();save();applyLang();applyBrand();renderBranchSel();go('dashboard');toast(L('تم الاستعادة','Restored'));}
async function autoBackupCheck(){const mode=db.settings.autoBackup;if(mode==='off')return;
  // Always keep an internal snapshot per session start
  await makeSnapshot('auto');
  // Scheduled file export (daily/weekly) — only if data exists and due
  if(!db.sales.length&&!db.purchases.length)return;
  const last=db.settings.lastAutoExport||'';const t0=today();
  let due=false;
  if(mode==='daily')due=last!==t0;
  else if(mode==='weekly'){if(!last)due=true;else due=Math.floor((Date.now()-new Date(last).getTime())/86400000)>=7;}
  if(due){setTimeout(()=>{if(confirm(L('حان وقت النسخة الاحتياطية التلقائية. تنزيل نسخة الآن؟','Time for your scheduled backup. Download now?')))doExport(false);else{db.settings.lastAutoExport=t0;save();}},900);}}
function downloadCSV(filename,rows){const csv=rows.map(r=>r.map(c=>{const v=(c==null?'':''+c).replace(/"/g,'""');return /[",\n]/.test(v)?`"${v}"`:v;}).join(',')).join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();toast(L('تم تصدير الملف','File exported'));}
function importData(el){const f=el.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{try{const d=JSON.parse(r.result);if(!d.products)throw 0;if(!confirm(L('سيتم استبدال كل البيانات. متابعة؟','This replaces all data. Continue?')))return;await makeSnapshot('before-import');db=d;migrate();save();applyLang();applyBrand();renderBranchSel();go('dashboard');toast(L('تم الاسترجاع','Restored'));}catch(e){toast(L('ملف غير صالح','Invalid file'),'err');}};r.readAsText(f);el.value='';}
async function resetAll(){if(!confirm(L('حذف كل البيانات نهائيًا؟','Permanently delete all data?')))return;await makeSnapshot('before-reset');const keep=db.settings;db={products:[],customers:[],suppliers:[],sales:[],purchases:[],returns:[],quotes:[],expenses:[],cash:[],stockMoves:[],branches:[],settings:{company:'مشروعي',vat:VAT_DEFAULT,currency:'ج.م',address:'',phone:'',taxNumber:'',pin:'',theme:keep.theme,lang:keep.lang,activeBranch:'',role:'manager',cashierPin:''},seq:{sale:1,purchase:1,ret:1,quote:1}};migrate();save();renderBranchSel();go('dashboard');toast(L('تم الحذف','Cleared'));}

function saveEmployee(id){
  const g=x=>document.getElementById(x).value;
  const name=g('em_name').trim();if(!name)return toast(L('اكتب الاسم','Enter name'),'err');
  const d={name,position:g('em_pos').trim(),phone:g('em_phone').trim(),salary:+g('em_sal')||0,startDate:g('em_start')||today(),notes:g('em_notes').trim()};
  if(id){Object.assign(db.employees.find(x=>x.id===id),d);}
  else db.employees.push({id:uid(),...d,payments:[]});
  save();closeModal();views.employees();toast(L('تم الحفظ','Saved'));}

function delEmployee(id){
  if(!confirm(L('حذف الموظف؟','Delete employee?')))return;
  db.employees=db.employees.filter(x=>x.id!==id);
  save();views.employees();toast(L('تم الحذف','Deleted'));}

function paySalary(id){
  const e=db.employees.find(x=>x.id===id);
  const month=today().slice(0,7);
  const already=(e.payments||[]).find(p=>p.month===month);
  if(already)return toast(L('تم صرف راتب هذا الشهر','Already paid this month'),'err');
  const amt=prompt(L(`صرف راتب ${e.name} (${money(e.salary)})`,`Pay salary for ${e.name} (${money(e.salary)})`),e.salary);
  if(amt===null)return;const v=+amt;if(!v||v<=0)return;
  if(!e.payments)e.payments=[];
  e.payments.push({id:uid(),month,date:today(),amount:v});
  addCash('out',v,`${L('راتب','Salary')}: ${e.name} ${month}`);
  // Also add as expense
  const expId=uid();db.expenses.push({id:expId,date:today(),cat:L('رواتب','Salaries'),amount:v,note:`${L('راتب','Salary')}: ${e.name}`});
  save();views.employees();toast(L('تم صرف الراتب','Salary paid'));}

function salaryHistory(id){
  const e=db.employees.find(x=>x.id===id);
  const payments=(e.payments||[]).slice().reverse();
  const total=payments.reduce((s,p)=>s+p.amount,0);
  openModal(`<div class="modal-h"><h3>📜 ${esc(e.name)} — ${L('سجل الرواتب','Salary History')}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b">

          <td class="t-num" style="color:${diff===null?'var(--muted)':diff>=0?'var(--ok)':'var(--danger)'}">${diff!==null?(diff>=0?'+':'')+money(diff):'—'}</td>

function donutSVG(pct){
  const r=46,cx=60,cy=60,circ=2*Math.PI*r;
  const fill=circ*(1-pct/100);
  const color=pct>=100?'var(--ok)':pct>=80?'var(--gold)':'var(--accent)';
  return `<div class="progress-ring">
    <svg viewBox="0 0 120 120" width="120" height="120">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line)" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
        stroke-dasharray="${circ}" stroke-dashoffset="${fill}" stroke-linecap="round"/>
    </svg>
    <div class="val">${pct}%</div>
  </div>`;}

function saveTarget(id){
  const month=document.getElementById('tg_month').value;

function poForm(){
  poLines=[{pid:'',name:'',qty:1,estCost:0}];
  const suppliers=db.suppliers;
  openModal(`<div class="modal-h"><h3>📋 ${L('أمر شراء جديد','New Purchase Order')}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b">
    <div class="grid2">
      <div class="field"><label>${L('المورد','Supplier')}</label>
        <select id="po_sup"><option value="">${L('اختر مورد','Select supplier')}</option>
        ${suppliers.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select>
      </div>
      <div class="field"><label>${L('التاريخ المتوقع','Expected Date')}</label><input id="po_date" type="date" value="${today()}"></div>
    </div>
    <div class="field"><label>${L('ملاحظات','Notes')}</label><input id="po_notes"></div>
    <div style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <b>${L('بنود الطلب','Order Items')}</b>
        <button class="btn btn-ghost btn-sm" onclick="addPOLine()">${L('+ إضافة صنف','+ Add item')}</button>
      </div>
      <div id="poLines"></div>
    </div>
  </div>
  <div class="modal-f"><button class="btn btn-primary" onclick="savePO()">${L('حفظ الأمر','Save Order')}</button><button class="btn btn-ghost" onclick="closeModal()">${L('إلغاء','Cancel')}</button></div>`,true);
  renderPOLines();}

function renderPOLines(){
  const el=document.getElementById('poLines');if(!el)return;
  el.innerHTML=`<table class="inv-items"><thead><tr>
    <th>${L('الصنف','Item')}</th><th>${L('الكمية','Qty')}</th><th>${L('تكلفة متوقعة','Est.Cost')}</th><th></th>
  </tr></thead><tbody>
  ${poLines.map((l,i)=>`<tr>
    <td>
      <select onchange="poLines[${i}].pid=this.value;const p=db.products.find(x=>x.id===this.value);if(p){poLines[${i}].name=p.name;poLines[${i}].estCost=p.cost;renderPOLines();}" style="width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink)">
        <option value="">${L('اختر صنف','Select item')}</option>
        ${db.products.map(p=>`<option value="${p.id}" ${l.pid===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
        <option value="__custom__" ${l.pid==='__custom__'?'selected':''}>✏️ ${L('صنف يدوي','Manual item')}</option>
      </select>
      ${l.pid==='__custom__'?`<input value="${esc(l.name)}" placeholder="${L('اسم الصنف','Item name')}" oninput="poLines[${i}].name=this.value" style="width:100%;padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink);margin-top:4px">`:''}
    </td>
    <td><input type="number" min="1" value="${l.qty}" oninput="poLines[${i}].qty=+this.value" style="width:70px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink)"></td>
    <td><input type="number" step="0.01" value="${l.estCost}" oninput="poLines[${i}].estCost=+this.value" style="width:90px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink)"></td>
    <td><button class="iconbtn del" onclick="poLines.splice(${i},1);renderPOLines()">🗑️</button></td>
  </tr>`).join('')}</tbody></table>`;}

function addPOLine(){poLines.push({pid:'',name:'',qty:1,estCost:0});renderPOLines();}

function savePO(){
  const sid=document.getElementById('po_sup').value;
  const sup=sid?db.suppliers.find(x=>x.id===sid):null;
  const lines=poLines.filter(l=>l.pid||l.name);
  if(!lines.length)return toast(L('أضف بنود','Add items'),'err');
  const o={id:uid(),no:(db.purchaseOrders.length+1),date:today(),supplierId:sid,supplierName:sup?sup.name:'',expectedDate:document.getElementById('po_date').value,notes:document.getElementById('po_notes').value.trim(),items:lines,status:'pending'};
  db.purchaseOrders.push(o);save();closeModal();views.purchaseOrders();toast(L('تم حفظ الأمر','Order saved'));}

function viewPO(id){
  const o=db.purchaseOrders.find(x=>x.id===id);
  const total=o.items.reduce((s,i)=>s+i.qty*(i.estCost||0),0);
  openModal(`<div class="modal-h"><h3>📋 ${L('أمر شراء','Purchase Order')} #${o.no}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b">
    <div style="margin-bottom:12px;font-size:13px"><b>${L('المورد','Supplier')}:</b> ${esc(o.supplierName||'—')} &nbsp;•&nbsp; <b>${L('التاريخ','Date')}:</b> ${o.date} &nbsp;•&nbsp; ${o.notes?`<b>${L('ملاحظات','Notes')}:</b> ${esc(o.notes)}`:''}  </div>
    <table><thead><tr><th>${L('الصنف','Item')}</th><th>${L('الكمية','Qty')}</th><th>${L('تكلفة متوقعة','Est.Cost')}</th><th>${L('الإجمالي','Total')}</th></tr></thead><tbody>
    ${o.items.map(i=>`<tr><td>${esc(i.name||db.products.find(p=>p.id===i.pid)?.name||'—')}</td><td class="t-num">${i.qty}</td><td class="t-num">${money(i.estCost||0)}</td><td class="t-num">${money(i.qty*(i.estCost||0))}</td></tr>`).join('')}
    </tbody></table>
    <div class="inv-totals"><div class="row grand"><span>${L('الإجمالي التقديري','Estimated Total')}</span><span>${money(total)}</span></div></div>
  </div>
  <div class="modal-f">
    ${o.status==='pending'?`<button class="btn btn-primary" onclick="closeModal();receivePO('${o.id}')">${L('استلام وتحويل لفاتورة شراء','Receive & Convert to Invoice')}</button>`:''}
    <button class="btn btn-ghost" onclick="closeModal()">${L('إغلاق','Close')}</button>
  </div>`,true);}

function receivePO(id){
  const o=db.purchaseOrders.find(x=>x.id===id);
  if(!confirm(L('تحويل أمر الشراء لفاتورة شراء فعلية؟','Convert to actual purchase invoice?')))return;
  o.status='received';o.receivedDate=today();
  save();
  // open purchase invoice pre-filled
  invKind='purchase';
  invLines=o.items.map(i=>{const p=findProduct(i.pid);return {pid:i.pid||'',qty:i.qty,price:i.estCost||0,name:i.name||(p?p.name:'')};});
  closeModal();
  const preSup=o.supplierId||'';
  // Navigate to purchase invoice builder
  invoiceForm('purchase',null,preSup);
  toast(L('تحويل لفاتورة شراء — راجع التفاصيل وأكد','Converted — review details and confirm'));}

function cancelPO(id){
  if(!confirm(L('إلغاء أمر الشراء؟','Cancel this order?')))return;
  db.purchaseOrders.find(x=>x.id===id).status='cancelled';
  save();views.purchaseOrders();toast(L('تم الإلغاء','Cancelled'));}

/* ============================================================
   SMART ALERTS (تنبيهات ذكية) — shown in dashboard
   ============================================================ */
function getAlerts(){
  const alerts=[];
  const thisMonth=today().slice(0,7);
  // Low stock
  db.products.filter(p=>p.qty<=p.min).forEach(p=>{
    alerts.push({type:'stock',icon:'📦',msg:L(`الصنف "${p.name}" وصل للحد الأدنى (${p.qty} متبقي)`,`"${p.name}" reached minimum stock (${p.qty} left)`),action:L('شراء','Buy'),view:'purchaseOrders'});
  });
  // Old debts (customers owing >30 days)
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);const cutS=cutoff.toISOString().slice(0,10);
  db.customers.filter(c=>c.balance>0).forEach(c=>{
    const oldSale=db.sales.filter(s=>s.customerId===c.id&&(s.dueAmount||0)>0&&s.date<cutS);
    if(oldSale.length)alerts.push({type:'debt',icon:'💸',msg:L(`${c.name} — دين قديم (+30 يوم): ${money(c.balance)}`,`${c.name} — old debt (+30 days): ${money(c.balance)}`),action:L('تحصيل','Collect'),view:'customers'});
  });
  // Unpaid salaries
  db.employees.forEach(e=>{
    const paid=(e.payments||[]).find(p=>p.month===thisMonth);
    if(!paid)alerts.push({type:'salary',icon:'👤',msg:L(`لم يُصرف راتب ${e.name} لهذا الشهر`,`${e.name}'s salary for this month not paid`),action:L('صرف','Pay'),view:'employees'});
  });
  // Target alert
  const tgt=db.targets.find(t=>t.month===thisMonth);
  if(tgt){
    const sales=db.sales.filter(s=>s.date.slice(0,7)===thisMonth).reduce((s,i)=>s+i.total,0);
    const pct=Math.round(sales/tgt.amount*100);
    const today_d=new Date();const daysLeft=new Date(today_d.getFullYear(),today_d.getMonth()+1,0).getDate()-today_d.getDate();
    if(pct<80&&daysLeft<10)alerts.push({type:'target',icon:'🎯',msg:L(`هدف الشهر: أنجزت ${pct}% فقط — ${daysLeft} يوم متبقي`,`Month target: only ${pct}% achieved — ${daysLeft} days left`),action:L('التفاصيل','Details'),view:'targets'});
  }
  return alerts;}

/* Boot */
(async function(){await load();applyLang();applyBrand();applyCustomBrand();renderBranchSel();
  if(db.settings.theme==='dark'){document.body.classList.add('dark');document.getElementById('themeBtn').textContent='☀️';}
  if(db.settings.pin){document.getElementById('lock').style.display='flex';setTimeout(()=>document.getElementById('lockPin').focus(),100);}
  go(isManager()?'dashboard':'pos');autoBackupCheck();})();
</script>
