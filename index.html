<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي — نظام إدارة المبيعات والحسابات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cairo:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f4f1ea; --panel:#fff; --ink:#1c2521; --muted:#7c857f; --line:#e6e1d6;
  --primary:#0f6b5c; --primary-d:#0a5044; --primary-soft:#e3f0ec;
  --accent:#c9783b; --accent-soft:#f7e8dc; --gold:#b8923a;
  --danger:#c0392b; --danger-soft:#fbe9e7; --ok:#2e7d52;
  --blue:#3b7fc9; --sidebar:#13231f;
  --shadow:0 1px 3px rgba(20,40,35,.06),0 8px 24px rgba(20,40,35,.06);
}
body.dark{
  --bg:#0f1c18; --panel:#16231e; --ink:#e6efe9; --muted:#8ba39b; --line:#26352f;
  --primary-soft:#143029; --accent-soft:#2c2017; --danger-soft:#2e1b18;
  --shadow:0 1px 3px rgba(0,0,0,.35),0 8px 24px rgba(0,0,0,.35);
}
body.dark{background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.03) 1px,transparent 0)}
body.dark .topbar{background:rgba(22,35,30,.85)}
body.dark th{background:#12201b}
body.dark tbody tr:hover{background:#1b2a24}
body.dark .pos-card,body.dark .cart,body.dark .field input,body.dark .field select,body.dark .field textarea,body.dark .search input,body.dark .modal-h .x,body.dark .qstep button{background:#1b2a24}
body.dark .pill-tabs,body.dark .modal-h .x{background:#12201b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;
  background-image:radial-gradient(circle at 1px 1px,rgba(15,107,92,.04) 1px,transparent 0);background-size:22px 22px;transition:background .2s,color .2s}
h1,h2,h3,h4{font-family:'Cairo',sans-serif;font-weight:700;line-height:1.3}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--sidebar);color:#cfe0db;position:fixed;top:0;right:0;height:100vh;display:flex;flex-direction:column;z-index:50}
html[dir=ltr] .sidebar{right:auto;left:0}
.brand{padding:20px 22px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand .logo{display:flex;align-items:center;gap:11px}
.brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--primary),#1ba086);display:grid;place-items:center;font-family:'Cairo';font-weight:800;color:#fff;font-size:19px;box-shadow:0 4px 12px rgba(15,107,92,.4)}
.brand h1{color:#fff;font-size:16px}
.brand p{color:#7d9690;font-size:11px;font-weight:400}
.nav{padding:10px 12px;flex:1;overflow-y:auto}
.nav .group{color:#5f7b74;font-size:10.5px;font-weight:600;letter-spacing:.5px;padding:12px 12px 5px}
.nav a{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;color:#bcd0cb;text-decoration:none;font-size:13.5px;font-weight:500;margin-bottom:2px;transition:.15s}
.nav a .ic{width:20px;text-align:center;font-size:15px;opacity:.85}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:linear-gradient(90deg,var(--primary),rgba(27,160,134,.7));color:#fff;box-shadow:0 4px 12px rgba(15,107,92,.35)}
.sidebar .foot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:#6f8b84}
.main{margin-right:248px;flex:1;min-width:0}
html[dir=ltr] .main{margin-right:0;margin-left:248px}
.topbar{background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar .ttl h2{font-size:19px}
.topbar .ttl p{color:var(--muted);font-size:12px}
.topbar .acts{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.content{padding:24px 28px 60px}
.btn{border:none;border-radius:10px;padding:10px 16px;font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(15,107,92,.25)}
.btn-primary:hover{background:var(--primary-d)}
.btn-ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{filter:brightness(.94)}
.btn-danger{background:var(--danger-soft);color:var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.btn-blue{background:var(--blue);color:#fff}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card .ic-bg{position:absolute;left:-8px;top:-8px;font-size:64px;opacity:.05}
.card .lbl{color:var(--muted);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:7px}
.card .val{font-family:'Cairo';font-size:25px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
.card .sub{font-size:11.5px;margin-top:3px;color:var(--muted)}.card .sub.up{color:var(--ok)}.card .sub.down{color:var(--danger)}
.card.kpi-1{border-top:3px solid var(--primary)}.card.kpi-2{border-top:3px solid var(--accent)}
.card.kpi-3{border-top:3px solid var(--gold)}.card.kpi-4{border-top:3px solid var(--blue)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:22px}
.panel-h{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.panel-h h3{font-size:16px}
.panel-b{padding:6px 0}.panel-b.pad{padding:20px}
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:10px 18px;font-size:11.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line);background:#faf9f5;white-space:nowrap}
html[dir=ltr] th{text-align:left}
td{padding:11px 18px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:.12s}tbody tr:hover{background:#faf9f3}
.t-num{font-variant-numeric:tabular-nums;font-weight:600}
.empty{text-align:center;color:var(--muted);padding:46px 20px;font-size:13.5px}
.empty .big{font-size:42px;opacity:.3;display:block;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge.ok{background:var(--primary-soft);color:var(--primary-d)}
.badge.warn{background:#fdf2dd;color:var(--gold)}
.badge.danger{background:var(--danger-soft);color:var(--danger)}
.badge.info{background:#e7f0fb;color:var(--blue)}
.badge.muted{background:var(--line);color:var(--muted)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fcfcfa;transition:.15s;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);background:var(--panel);box-shadow:0 0 0 3px var(--primary-soft)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.modal-bg{position:fixed;inset:0;background:rgba(20,35,30,.5);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:36px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border-radius:18px;width:100%;max-width:560px;box-shadow:0 24px 64px rgba(0,0,0,.25);animation:pop .2s ease}
.modal.lg{max-width:880px}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal-h{padding:17px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{font-size:17px}
.modal-h .x{background:#f1efe8;border:none;width:32px;height:32px;border-radius:9px;font-size:18px;color:var(--muted)}
.modal-h .x:hover{background:var(--danger-soft);color:var(--danger)}
.modal-b{padding:22px}
.modal-f{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-start;flex-wrap:wrap}
.inv-items th,.inv-items td{padding:7px 10px}
.inv-items input,.inv-items select{padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--panel);width:100%;color:var(--ink)}
.inv-totals{margin-top:16px;margin-right:auto;width:320px}
html[dir=ltr] .inv-totals{margin-right:0;margin-left:auto}
.inv-totals .row{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px}
.inv-totals .row.grand{border-top:2px solid var(--ink);margin-top:6px;padding-top:10px;font-size:18px;font-family:'Cairo';font-weight:800;color:var(--primary-d)}
.search{position:relative}
.search input{padding:9px 36px 9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel);width:240px;color:var(--ink)}
.search .si{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted)}
html[dir=ltr] .search .si{right:auto;left:11px}
.row-acts{display:flex;gap:6px;flex-wrap:wrap}
.iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel);display:grid;place-items:center;font-size:14px;color:var(--muted)}
.iconbtn:hover{border-color:var(--primary);color:var(--primary)}
.iconbtn.del:hover{border-color:var(--danger);color:var(--danger)}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:200px;padding:10px 4px}
.bar-chart .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.bar-chart .bar{width:100%;max-width:42px;background:linear-gradient(180deg,var(--primary),#1ba086);border-radius:7px 7px 0 0;min-height:3px;transition:.4s}
.bar-chart .bar:hover{filter:brightness(1.1)}
.bar-chart .bl{font-size:11px;color:var(--muted)}
.bar-chart .bv{font-size:10.5px;font-weight:700;color:var(--primary-d)}
.pill-tabs{display:flex;gap:6px;background:var(--line);padding:4px;border-radius:12px}
.pill-tabs button{flex:1;border:none;background:transparent;padding:7px 12px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.pill-tabs button.active{background:var(--panel);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.profit-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:4px}
.profit-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),#1ba086);transition:.4s}
.progress-ring{width:120px;height:120px;position:relative;display:inline-flex;align-items:center;justify-content:center}
.progress-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.progress-ring .val{font-family:'Cairo';font-weight:800;font-size:22px;color:var(--primary-d)}
.target-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow);text-align:center}
.kpi-compare{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.kpi-compare.up{color:var(--ok)}.kpi-compare.down{color:var(--danger)}
.emp-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#1ba086);display:inline-flex;align-items:center;justify-content:center;font-family:Cairo;font-weight:700;color:#fff;font-size:14px}
.alert-dot{display:inline-block;width:8px;height:8px;background:var(--danger);border-radius:50%;margin-right:4px}
.cat-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--muted);transition:.15s}
.cat-chip:hover,.cat-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.toast{position:fixed;bottom:24px;left:24px;background:var(--ink);color:var(--panel);padding:13px 20px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:0 12px 32px rgba(0,0,0,.3);z-index:200;display:flex;align-items:center;gap:9px;transform:translateY(80px);opacity:0;transition:.3s}
.toast.show{transform:none;opacity:1}.toast.ok{background:var(--primary-d);color:#fff}.toast.err{background:var(--danger);color:#fff}
.hint{font-size:12px;color:var(--ink);background:var(--primary-soft);padding:10px 14px;border-radius:10px;margin-bottom:16px;display:flex;gap:8px;align-items:flex-start}
/* ===== Mobile drawer + responsive ===== */
.menuBtn{display:none}
.navOverlay{position:fixed;inset:0;background:rgba(10,20,17,.5);z-index:49;opacity:0;pointer-events:none;transition:.25s}
.navOverlay.show{opacity:1;pointer-events:auto}
@media(max-width:1000px){
  .cards{grid-template-columns:1fr 1fr}
  .sidebar{transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);box-shadow:none}
  html[dir=ltr] .sidebar{transform:translateX(-100%)}
  body.nav-open .sidebar{transform:none;box-shadow:-12px 0 40px rgba(0,0,0,.3)}
  html[dir=ltr] body.nav-open .sidebar{box-shadow:12px 0 40px rgba(0,0,0,.3)}
  .main{margin-right:0;margin-left:0}
  .menuBtn{display:grid}
  .content{padding:18px 16px 60px}
  .topbar{padding:11px 16px}
  .pos{grid-template-columns:1fr}
  .cart{position:static;top:auto}
  .cart-items{max-height:none}
  .modal-bg{padding:16px 10px}
  .grid3{grid-template-columns:1fr}
}
@media(max-width:600px){
  .cards{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .topbar .ttl h2{font-size:17px}
  .pos-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px}
  .inv-totals{width:100%}
  .modal-f{flex-wrap:wrap}.modal-f .btn{flex:1;justify-content:center}
  table{font-size:12.5px}th,td{padding:9px 10px}
}
.loading{display:grid;place-items:center;height:100vh;color:var(--muted)}
.pos{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:12px}
.pos-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);text-align:center}
.pos-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.pos-card .nm{font-weight:600;font-size:13px;margin:6px 0 2px}
.pos-card .pr{color:var(--primary-d);font-weight:700;font-size:13px}
.pos-card .q{font-size:11px;color:var(--muted)}
.pos-card.out{opacity:.45;pointer-events:none}
.cart{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);position:sticky;top:80px}
.cart-h{padding:14px 18px;border-bottom:1px solid var(--line);font-family:'Cairo';font-weight:700;display:flex;justify-content:space-between;align-items:center}
.cart-items{max-height:40vh;overflow-y:auto}
.cart-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--line)}
.cart-row .ci-n{flex:1;font-size:13px;font-weight:600}
.cart-row .ci-p{font-size:11.5px;color:var(--muted)}
.qstep{display:flex;align-items:center;gap:6px}
.qstep button{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:#faf9f5;font-weight:700;color:var(--primary-d)}
.qstep span{min-width:22px;text-align:center;font-weight:700}
.cart-f{padding:16px 18px;border-top:1px solid var(--line)}
.cart-f .tt{display:flex;justify-content:space-between;font-family:'Cairo';font-weight:800;font-size:20px;color:var(--primary-d);margin-bottom:12px}
@media print{.sidebar,.topbar,.modal-f,.no-print{display:none!important}.main{margin:0}.content{padding:0}.modal-bg{position:static;background:none;padding:0;display:block}.modal{box-shadow:none;max-width:100%;border-radius:0}body{background:#fff;background-image:none}}
.lock{position:fixed;inset:0;background:var(--sidebar);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff}
.lock .box{background:rgba(255,255,255,.06);padding:34px 40px;border-radius:20px;text-align:center;width:320px}
.lock input{width:100%;text-align:center;font-size:22px;letter-spacing:8px;padding:12px;border-radius:12px;border:none;margin:16px 0}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo"><div class="mark" id="brandMark">حـ</div>
      <div><h1 id="brandName">حسابي</h1><p id="brandTag">إدارة المبيعات والحسابات</p></div></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot" id="footNote">بياناتك محفوظة تلقائيًا على جهازك</div>
  </aside>
  <div class="navOverlay" id="navOverlay" onclick="toggleNav(false)"></div>
  <div class="main">
    <div class="topbar"><div class="ttl" style="display:flex;align-items:center;gap:10px">
      <button class="iconbtn menuBtn" onclick="toggleNav()" title="القائمة" aria-label="Menu">☰</button>
      <div><h2 id="pageTitle">لوحة التحكم</h2><p id="pageSub"></p></div></div>
      <div class="acts">
        <select id="branchSel" onchange="switchBranch(this.value)" title="الفرع النشط" style="padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--ink);font-size:12.5px;font-weight:600"></select>
        <button class="iconbtn" id="langBtn" onclick="toggleLang()" title="English / عربي">EN</button>
        <button class="iconbtn" id="themeBtn" onclick="toggleTheme()" title="الوضع الليلي">🌙</button>
        <button class="iconbtn" id="alertsBtn" onclick="go('dashboard')" title="التنبيهات" style="position:relative">🔔<span id="alertsBadge" style="display:none;position:absolute;top:-4px;left:-4px;min-width:16px;height:16px;background:var(--danger);color:#fff;border-radius:8px;font-size:10px;font-weight:700;padding:0 3px;line-height:16px;text-align:center"></span></button>
      <div id="topActions" style="display:flex;gap:10px;flex-wrap:wrap"></div>
      </div></div>
    <div id="backupBanner" style="display:none;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:var(--danger);color:#fff;padding:10px 20px;font-size:13px;font-weight:600"></div>
    <div class="content" id="content"><div class="loading">…</div></div>
  </div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<div class="lock" id="lock" style="display:none"><div class="box">
  <div style="font-size:40px">🔒</div><h3 style="margin-top:10px" id="lockTtl">النظام مقفل</h3>
  <input id="lockPin" type="password" inputmode="numeric" maxlength="8" placeholder="••••" onkeydown="if(event.key==='Enter')tryUnlock()">
  <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="tryUnlock()" id="lockBtn">دخول</button>
</div></div>
<div class="lock" id="loginScreen" style="display:none"><div class="box" style="min-width:280px">
  <div style="font-size:40px">👤</div><h3 style="margin-top:10px" id="loginTtl">تسجيل الدخول</h3>
  <input id="loginEmail" type="email" placeholder="name@example.com" style="text-align:left" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
  <input id="loginPass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')emailLogin()">
  <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="emailLogin()" id="loginBtn">دخول</button>
</div></div>

<div class="lock" id="authScreen" style="display:none"><div class="box" style="min-width:300px">
  <div style="font-size:40px">☁️</div>
  <div class="pill-tabs" id="authTabs" style="margin:14px 0 8px">
    <button type="button" id="authTabSignin" onclick="setAuthMode('signin')">دخول</button>
    <button type="button" id="authTabSignup" onclick="setAuthMode('signup')">إنشاء حساب جديد</button>
  </div>

/* ===== v2 granular storage =====
   Every record in db (products, sales, ...) gets its own row in v2_records.
   save() diffs the in-memory db against the last-synced snapshot and only
   writes what actually changed — so one new invoice = one tiny write, and
   two devices on the same account never clobber each other's whole dataset. */
let V2_SNAP={};                 // last-synced map: kind -> { recId: jsonString }
let V2_IDMAP={};                // kind -> { localId -> rowUuid }
let V2_READY=false;             // true once this account is on v2 storage

function snapStr(o){try{return JSON.stringify(o);}catch(e){return Math.random().toString();}}

async function save(){
  try{
    if(!CURRENT_UID&&sb){try{const {data:{session}}=await sb.auth.getSession();CURRENT_UID=session?.user?.id||null;}catch(e){}}
    cacheLocal(CURRENT_UID);                       // local safety net first, always
    if(!sb||!CURRENT_UID||!V2_READY)return;        // offline / not-yet-migrated → local only
    await syncV2();
  }catch(e){
    console.warn('save error',e);
    cacheLocal(CURRENT_UID);
  }
}

async function syncV2(){
  const upserts=[]; const deleteIds=[]; const nextSnap={};
  // 1) array collections → one row per record
  for(const kind of V2_KINDS){
    const arr=Array.isArray(db[kind])?db[kind]:[];
    const prev=V2_SNAP[kind]||{}; const cur={};
    V2_IDMAP[kind]=V2_IDMAP[kind]||{};
    for(const rec of arr){
      if(!rec) continue;
      if(rec.id==null) rec.id=uid();               // guarantee a stable local id
      const lid=String(rec.id); const s=snapStr(rec); cur[lid]=s;
      if(prev[lid]!==s){                            // new or changed
        upserts.push({ kind, local_id: lid, data: rec });
      }
    }
    // anything in prev but not in cur → deleted locally
    for(const lid in prev){ if(!(lid in cur)){ const ru=V2_IDMAP[kind][lid]; if(ru) deleteIds.push(ru); delete V2_IDMAP[kind][lid]; } }
    nextSnap[kind]=cur;
  }
  // 2) settings + seq → single settings blob
  const settingsBlob={}; for(const k of V2_SETTINGS_KEYS) settingsBlob[k]=db[k];
  const settingsStr=snapStr(settingsBlob);
  const settingsChanged = V2_SNAP.__settings!==settingsStr;
  nextSnap.__settings=settingsStr;

  // nothing to do?
  if(!upserts.length && !deleteIds.length && !settingsChanged){ V2_SNAP=nextSnap; return; }
  if(!CURRENT_ORG){ console.warn('no org resolved — skipping cloud sync'); return; }

  // 3) apply the ENTIRE change-set in ONE database transaction (atomic: all-or-nothing)
  const {data,error}=await sb.rpc('v2_apply_changes',{
    p_org: CURRENT_ORG,
    p_upserts: upserts,
    p_delete_ids: deleteIds,
    p_settings: settingsChanged ? settingsBlob : null
  });
  if(error)throw error;
  // map returned row uuids back to local ids (RPC returns out_* aliases)
  (data||[]).forEach(r=>{ const k=r.out_kind||r.kind, lid=r.out_local_id||r.local_id, rid=r.out_id||r.id; V2_IDMAP[k]=V2_IDMAP[k]||{}; V2_IDMAP[k][lid]=rid; });
  V2_SNAP=nextSnap;                                 // commit snapshot only after the transaction succeeds
}

/* Resolve which shop (org) this user belongs to, and their role.
   Creates a shop on first login if somehow none exists. */
async function resolveOrg(uid){
  // 1) my memberships (role lives here)
  const {data:mem,error:me}=await sb.from('org_members').select('org_id,role').eq('user_id',uid);
  if(me)throw me;
  if(mem&&mem.length){ CURRENT_ORG=mem[0].org_id; CURRENT_ROLE=mem[0].role||'manager'; return; }
  // 2) none yet → create one (this becomes my shop, I'm the manager)
  const {data:org,error:oe}=await sb.from('orgs').insert({name:'محلي',owner_id:uid}).select('id').single();
  if(oe)throw oe;
  CURRENT_ORG=org.id; CURRENT_ROLE='manager';
  const {error:ie}=await sb.from('org_members').insert({org_id:CURRENT_ORG,user_id:uid,role:'manager',email:(db.settings&&db.settings.cloudEmail)||null});
  if(ie)throw ie;
}

async function load(){
  if(!CURRENT_UID&&sb){try{const {data:{session}}=await sb.auth.getSession();CURRENT_UID=session?.user?.id||null;}catch(e){}}
  const uid=CURRENT_UID;
  if(!sb||!uid){seedDemo();migrate();return;}
  try{
    await resolveOrg(uid);                         // figure out my shop + role
    const org=CURRENT_ORG;
    // --- read all v2 records for this shop ---
    const recs=await fetchAllV2Records(org);
    const {data:setRow}=await sb.from(V2_SETTINGS).select('data').eq('org_id',org).maybeSingle();

    if((recs&&recs.length)|| (setRow&&setRow.data&&setRow.data.settings)){
      for(const kind of V2_KINDS) db[kind]=[];
      V2_SNAP={}; V2_IDMAP={};
      for(const r of (recs||[])){
        if(!V2_KINDS.includes(r.kind))continue;
        db[r.kind].push(r.data);
        (V2_SNAP[r.kind]=V2_SNAP[r.kind]||{})[String(r.local_id)]=snapStr(r.data);
        (V2_IDMAP[r.kind]=V2_IDMAP[r.kind]||{})[String(r.local_id)]=r.id;
      }
      if(setRow&&setRow.data){ for(const k of V2_SETTINGS_KEYS){ if(setRow.data[k]!==undefined) db[k]=setRow.data[k]; } V2_SNAP.__settings=snapStr({settings:db.settings,seq:db.seq}); }
      db.settings.role=CURRENT_ROLE;               // role comes from the server, not local
      migrate(); V2_READY=true; cacheLocal(uid); return;
    }

    // --- shop has no data yet: migrate from this user's old per-user rows, else demo ---
    let seed=null;
    try{
      const mineByUser=await fetchAllV2RecordsByUser(uid);  // legacy rows tagged by user_id
      if(mineByUser&&mineByUser.length){
        for(const kind of V2_KINDS) db[kind]=[];
        for(const r of mineByUser){ if(V2_KINDS.includes(r.kind)) db[r.kind].push(r.data); }
        const {data:su}=await sb.from(V2_SETTINGS).select('data').eq('user_id',uid).maybeSingle();
        if(su&&su.data){ for(const k of V2_SETTINGS_KEYS){ if(su.data[k]!==undefined) db[k]=su.data[k]; } }
        seed='from-v2-user';
      }
    }catch(e){}
    if(!seed){
      try{ const {data:v1}=await sb.from(DATA_TABLE).select('data').eq('user_id',uid).maybeSingle(); if(v1&&v1.data&&v1.data.products!==undefined){db=Object.assign(db,v1.data);seed='v1';} }catch(e){}
    }
    if(!seed){ const legacy=await tryMigrateLegacy(); if(legacy){db=Object.assign(db,legacy);seed='legacy';} }
    if(!seed) seedDemo();
    db.settings.role=CURRENT_ROLE;
    migrate();
    V2_READY=true; V2_SNAP={}; V2_IDMAP={};
    await syncV2();                                // push seeded data up, now tagged with org_id
    cacheLocal(uid); return;
  }catch(e){
    console.warn('v2 load failed — using local cache',e);
    try{const c=localStorage.getItem('hesaby_cache_'+uid);if(c){db=Object.assign(db,JSON.parse(c));migrate();V2_READY=false;return;}}catch(_){}
    seedDemo();migrate();V2_READY=false;
  }
}

// Per-product stats over the last `days` (default 90): qty sold, revenue, profit, daily velocity, days of stock left.
function productStats(days){
  days=days||90;const since=addDays(today(),-days);
  const m={};db.products.forEach(p=>{m[p.id]={pid:p.id,name:p.name,qty:0,revenue:0,profit:0,stock:p.qty,cost:p.cost||0,price:p.price||0,firstSale:null,lastSale:null};});
  bf(db.sales).filter(s=>s.date>=since).forEach(s=>(s.items||[]).forEach(it=>{
    const r=m[it.pid];if(!r)return;const line=it.price*it.qty;const c=(it.cost!=null?it.cost:0)*it.qty;
    r.qty+=it.qty;r.revenue+=line;r.profit+=(line-c);
    if(!r.firstSale||s.date<r.firstSale)r.firstSale=s.date;if(!r.lastSale||s.date>r.lastSale)r.lastSale=s.date;}));
  db.returns.filter(r=>r.type==='sale'&&r.date>=since).forEach(r=>(r.items||[]).forEach(it=>{const x=m[it.pid];if(x)x.qty-=it.qty;}));
  const tdy=new Date(today());
  Object.values(m).forEach(r=>{
    // Velocity over the active selling span (first sale → today), so a fast mover isn't diluted by an empty window.
    let span=days;if(r.firstSale){span=Math.max(1,Math.round((tdy-new Date(r.firstSale))/86400000)+1);span=Math.min(span,days);}
    r.velocity=r.qty>0?r.qty/span:0;r.daysLeft=r.velocity>0?Math.floor(r.stock/r.velocity):Infinity;r.marginPct=r.revenue>0?Math.round(r.profit/r.revenue*100):0;});
  return m;
}
// Reorder suggestions: items that will run out within `leadDays` based on RECENT velocity, plus already-low items.
function reorderSuggestions(leadDays){leadDays=leadDays||7;const m=productStats(30);const out=[];
  db.products.forEach(p=>{const r=m[p.id];if(!r)return;
    const willRunOut=r.velocity>0&&r.daysLeft<=leadDays;const low=p.qty<=(p.min||0);
    if(willRunOut||low){const target=r.velocity>0?Math.ceil(r.velocity*30):(p.min||0)*2;const suggest=Math.max(target-p.qty,(p.min||0));
      out.push({pid:p.id,name:p.name,stock:p.qty,velocity:r.velocity,daysLeft:r.daysLeft,suggest:Math.max(1,suggest),low,willRunOut});}});
  return out.sort((a,b)=>a.daysLeft-b.daysLeft);
}
// Customers who used to buy regularly but have gone quiet.
function dormantCustomers(){const res=[];const tdy=new Date(today());
  db.customers.forEach(c=>{const cs=bf(db.sales).filter(s=>s.customerId===c.id).sort((a,b)=>a.date<b.date?-1:1);
    if(cs.length<2)return;const dates=cs.map(s=>new Date(s.date));
    let gaps=0;for(let i=1;i<dates.length;i++)gaps+=(dates[i]-dates[i-1]);
    const avgGap=gaps/(dates.length-1)/86400000;const last=dates[dates.length-1];const sinceLast=(tdy-last)/86400000;
    if(avgGap>0&&sinceLast>avgGap*2&&sinceLast>=14){res.push({id:c.id,name:c.name,phone:c.phone,sinceLast:Math.round(sinceLast),avgGap:Math.round(avgGap),orders:cs.length,total:cs.reduce((a,s)=>a+s.total,0)});}});
  return res.sort((a,b)=>b.total-a.total);
}
// Dead stock: in stock but not sold in `days`, with tied-up money.
function deadStock(days){days=days||60;const since=addDays(today(),-days);const sold={};
  bf(db.sales).filter(s=>s.date>=since).forEach(s=>(s.items||[]).forEach(it=>{sold[it.pid]=(sold[it.pid]||0)+it.qty;}));
  return db.products.filter(p=>p.qty>0&&!sold[p.id]).map(p=>({pid:p.id,name:p.name,stock:p.qty,tied:(p.cost||0)*p.qty})).sort((a,b)=>b.tied-a.tied);
}
// Simple cash-flow projection for next `days`.
function cashflowProjection(days){days=days||30;const horizon=addDays(today(),days);
  const inflow=db.sales.filter(s=>(s.dueAmount||0)>0&&s.dueDate&&s.dueDate<=horizon).reduce((a,s)=>a+s.dueAmount,0);
  const outSup=db.purchases.filter(s=>(s.dueAmount||0)>0&&s.dueDate&&s.dueDate<=horizon).reduce((a,s)=>a+s.dueAmount,0);
  // recurring monthly expenses estimate: average of last 60 days expenses scaled to window
  const since=addDays(today(),-60);const recentExp=db.expenses.filter(e=>e.date>=since).reduce((a,e)=>a+e.amount,0);
  const expEstimate=Math.round(recentExp/60*days);
  const onHand=cashBalance()+db.banks.reduce((a,b)=>a+bankBalance(b.id),0);
  return {onHand,inflow,outSup,expEstimate,projected:onHand+inflow-outSup-expEstimate};
}

    return `<div class="pos-card ${p.qty<=0?'out':''}" onclick="posTap('${p.id}')"><div style="height:48px;display:grid;place-items:center">${p.img?`<img src="${p.img}" style="width:48px;height:48px;object-fit:cover;border-radius:10px">`:'<div style="font-size:28px">🏷️</div>'}</div><div class="nm">${esc(p.name)}</div><div class="pr">${money(p.price)}${p.byWeight?`/${L('كجم','kg')}`:''}</div><div class="q">${L('متاح','Avail')}: ${fmtStock(p)} ${tags}</div></div>`;}).join(''):'';

function posTapBundle(id){const b=(db.bundles||[]).find(x=>x.id===id);if(!b)return;
  for(const it of b.items){const p=findProduct(it.pid);if(!p)return toast(L('مكوّن محذوف','Component deleted'),'err');const used=cartUsedQty(it.pid);if(p.qty-used<it.qty)return toast(`${L('غير متاح','Out of stock')}: ${esc(p.name)}`,'err');}
  // Prorate the bundle price across components so line totals sum exactly to the bundle price
  const sum=b.items.reduce((a,it)=>{const p=findProduct(it.pid);return a+(p?p.price*it.qty:0);},0);
  const factor=sum>0?b.price/sum:1;
  b.items.forEach(it=>{const p=findProduct(it.pid);const unit=Math.round((p.price*factor)*100)/100;

  const presets=(p.weightPresets&&p.weightPresets.length?p.weightPresets:[250,500,1000]);
  const startGrams=editLine&&editLine.byWeight?Math.round(editLine.qty*1000):(presets[0]||250);
  const startQty=editLine&&!editLine.byWeight?editLine.qty:1;

function posCalc(){const sub=cart.reduce((s,c)=>s+lineUnit(c)*c.qty,0);

function posSplitChanged(which){const T=posCalc();const cEl=document.getElementById('posSplitCash'),dEl=document.getElementById('posSplitCard');if(!cEl||!dEl)return;

function posUpdateChange(){const pay=document.getElementById('posPay')?.value||'cash';const btn=document.getElementById('posCheckoutBtn');

  if(pay==='split'){const T=posCalc();const c=+(document.getElementById('posSplitCash')?.value)||0,d=+(document.getElementById('posSplitCard')?.value)||0;

      else{cb.style.background='var(--danger-soft)';cb.innerHTML=`<div style="font-size:12px;color:var(--danger)">${L('المبلغ غير كافٍ — ناقص','Insufficient — short by')}</div><div style="font-family:Cairo;font-weight:800;font-size:22px;color:var(--danger)">${money(Math.abs(change))}</div>`;}

function posCheckout(){if(!cart.length)return;const cid=document.getElementById('posCustomer').value;

function holdSale(){if(!cart.length)return toast(L('السلة فارغة','Cart is empty'),'err');

function resumeHeld(id){const h=db.heldSales.find(x=>x.id===id);if(!h)return;
  if(cart.length&&!confirm(L('سيتم استبدال السلة الحالية. متابعة؟','This replaces the current cart. Continue?')))return;

function renderProductsTab(q){
  if(prodTab==='moves'){renderStockMoves(q);return;}
  let list=db.products.filter(p=>
    (matches(p.name,q)||matches(p.cat,q)||matches(p.sku,q))&&
    (!prodCatFilter||p.cat===prodCatFilter));
  if(prodTab==='list') renderProductsList(list);
  else if(prodTab==='profit') renderProductsProfit(list);
  else if(prodTab==='low') renderProductsLow(list);
}
let smFrom='',smTo='',smType='',smProd='';
function moveKindLabel(k){return k==='in'?L('وارد','In'):k==='out'?L('منصرف','Out'):k==='adjust'?L('تسوية','Adjust'):k==='transfer'?L('تحويل','Transfer'):k;}
function moveKindBadge(k){const cls=k==='in'?'ok':k==='out'?'danger':k==='adjust'?'warn':'info';return `<span class="badge ${cls}">${moveKindLabel(k)}</span>`;}
function filteredStockMoves(q){return db.stockMoves.filter(m=>
    (!smProd||m.pid===smProd)&&
    (!smType||m.kind===smType)&&
    inRange(m.date,smFrom,smTo)&&
    (matches(m.name,q)||matches(m.note,q)||matches(m.ref,q))
  ).slice().reverse();}
function renderStockMoves(q){
  q=q||'';
  const prods=[...db.products].sort((a,b)=>a.name<b.name?-1:1);
  const moves=filteredStockMoves(q);
  const totIn=moves.filter(m=>m.delta>0).reduce((s,m)=>s+m.delta,0);
  const totOut=moves.filter(m=>m.delta<0).reduce((s,m)=>s+Math.abs(m.delta),0);
  document.getElementById('prodTable').innerHTML=`
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--line)">
      <div class="field" style="margin:0"><label>${L('من','From')}</label><input type="date" value="${smFrom}" onchange="smFrom=this.value;renderProductsTab(document.getElementById('prodSearchInp').value||'')"></div>
      <div class="field" style="margin:0"><label>${L('إلى','To')}</label><input type="date" value="${smTo}" onchange="smTo=this.value;renderProductsTab(document.getElementById('prodSearchInp').value||'')"></div>
      <div class="field" style="margin:0"><label>${L('الصنف','Item')}</label><select onchange="smProd=this.value;renderProductsTab(document.getElementById('prodSearchInp').value||'')"><option value="">${L('كل الأصناف','All items')}</option>${prods.map(p=>`<option value="${p.id}" ${smProd===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
      <div class="field" style="margin:0"><label>${L('النوع','Type')}</label><select onchange="smType=this.value;renderProductsTab(document.getElementById('prodSearchInp').value||'')"><option value="">${L('الكل','All')}</option><option value="in" ${smType==='in'?'selected':''}>${L('وارد','In')}</option><option value="out" ${smType==='out'?'selected':''}>${L('منصرف','Out')}</option><option value="adjust" ${smType==='adjust'?'selected':''}>${L('تسوية','Adjust')}</option><option value="transfer" ${smType==='transfer'?'selected':''}>${L('تحويل','Transfer')}</option></select></div>
      <button class="btn btn-ghost btn-sm" onclick="smFrom='';smTo='';smType='';smProd='';renderProductsTab('')">${L('مسح الفلاتر','Clear')}</button>
      <button class="btn btn-ghost btn-sm" onclick="exportStockMovesCSV()" style="margin-right:auto">📊 ${L('تصدير CSV','Export CSV')}</button>
    </div>
    <div style="display:flex;gap:18px;padding:10px 18px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--line)">
      <span>${L('عدد الحركات','Movements')}: <b style="color:var(--ink)">${moves.length}</b></span>
      <span style="color:var(--ok)">↑ ${L('وارد','In')}: <b>${fmt(totIn)}</b></span>
      <span style="color:var(--danger)">↓ ${L('منصرف','Out')}: <b>${fmt(totOut)}</b></span>
    </div>
    ${moves.length?`<table><thead><tr><th>${L('التاريخ','Date')}</th><th>${L('الصنف','Item')}</th><th>${L('النوع','Type')}</th><th>${L('الكمية','Qty')}</th><th>${L('الرصيد بعدها','Balance')}</th><th>${L('المرجع','Reference')}</th></tr></thead><tbody>
    ${moves.map(m=>`<tr><td>${m.date}</td><td>${esc(m.name)}</td><td>${moveKindBadge(m.kind)}</td><td class="t-num" style="color:${m.delta>=0?'var(--ok)':'var(--danger)'}">${m.delta>=0?'+':''}${m.delta}</td><td class="t-num">${m.balance}</td><td style="color:var(--muted)">${esc(m.note||'')}</td></tr>`).join('')}</tbody></table>`:`<div class="empty"><span class="big">📜</span>${L('لا توجد حركات في هذه الفترة','No movements in this range')}</div>`}`;
}
function exportStockMovesCSV(){const moves=filteredStockMoves(document.getElementById('prodSearchInp')?.value||'');
  if(!moves.length)return toast(L('لا توجد حركات','No movements'),'err');
  const rows=[[L('التاريخ','Date'),L('الصنف','Item'),L('النوع','Type'),L('الكمية','Qty'),L('الرصيد بعدها','Balance'),L('المرجع','Reference')]];
  moves.forEach(m=>rows.push([m.date,m.name,moveKindLabel(m.kind),m.delta,m.balance,m.note||'']));
  downloadCSV(`stock-moves-${smFrom||'all'}_${smTo||'all'}.csv`,rows);}
/* Stock transfer between branches */
function stockTransferForm(){if(db.branches.length<2)return toast(L('تحتاج فرعين على الأقل','Need at least two branches'),'err');
  const prods=[...db.products].sort((a,b)=>a.name<b.name?-1:1);
  const branchOpts=sel=>db.branches.map(b=>`<option value="${b.id}" ${b.id===sel?'selected':''}>🏢 ${esc(b.name)}</option>`).join('');
  openModal(`<div class="modal-h"><h3>🔄 ${L('تحويل مخزون بين الفروع','Transfer Stock Between Branches')}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b"><div class="grid2"><div class="field"><label>${L('من فرع','From branch')}</label><select id="tf_from">${branchOpts(activeBranch())}</select></div>
    <div class="field"><label>${L('إلى فرع','To branch')}</label><select id="tf_to">${branchOpts(db.branches.find(b=>b.id!==activeBranch())?.id)}</select></div></div>
    <div class="field"><label>${L('الصنف','Item')}</label><select id="tf_prod">${prods.map(p=>`<option value="${p.id}">${esc(p.name)} (${fmtStock(p)})</option>`).join('')}</select></div>
    <div class="field"><label>${L('الكمية المحوّلة','Quantity to transfer')}</label><input id="tf_qty" type="number" step="any" min="0"></div>
    <div class="hint">💡 ${L('يُسجَّل التحويل في حركة المخزون لكل فرع، والإجمالي لا يتغير.','Logged in stock movement for each branch; total stock is unchanged.')}</div></div>
  <div class="modal-f"><button class="btn btn-primary" onclick="saveStockTransfer()">${L('تنفيذ التحويل','Transfer')}</button><button class="btn btn-ghost" onclick="closeModal()">${L('إلغاء','Cancel')}</button></div>`);}
function saveStockTransfer(){const from=document.getElementById('tf_from').value,to=document.getElementById('tf_to').value;
  const pid=document.getElementById('tf_prod').value;const qty=+document.getElementById('tf_qty').value||0;
  if(from===to)return toast(L('اختر فرعين مختلفين','Choose two different branches'),'err');
  if(qty<=0)return toast(L('اكتب كمية','Enter a quantity'),'err');
  const p=findProduct(pid);if(!p)return;if(qty>p.qty)return toast(`${L('الكمية أكبر من المتاح','Exceeds stock')} (${fmtStock(p)})`,'err');
  const ref=uid();
  // Out from source branch, in to destination — net zero on global qty
  db.stockMoves.push({id:uid(),date:today(),pid,name:p.name,delta:-qty,kind:'transfer',balance:p.qty,note:`${L('تحويل إلى','Transfer to')} ${branchName(to)}`,ref,branch:from});
  db.stockMoves.push({id:uid(),date:today(),pid,name:p.name,delta:qty,kind:'transfer',balance:p.qty,note:`${L('تحويل من','Transfer from')} ${branchName(from)}`,ref,branch:to});
  save();closeModal();toast(L('تم التحويل','Transferred'));if(current==='products'){prodTab='moves';views.products();}}
/* Bundles / Kits */

  <div class="modal-b"><div class="hint">${L('التجميعة = مجموعة أصناف تُباع معًا بسعر واحد. عند البيع يُخصم كل صنف من المخزون.','A bundle = items sold together at one price. Selling it deducts each component from stock.')}</div>
  ${db.bundles.length?`<table><thead><tr><th>${L('الاسم','Name')}</th><th>${L('المكوّنات','Components')}</th><th>${L('السعر','Price')}</th><th></th></tr></thead><tbody>

let bundleLines=[];
function bundleForm(){bundleLines=[{pid:'',qty:1}];
  openModal(`<div class="modal-h"><h3>🎁 ${L('تجميعة جديدة','New Bundle')}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b"><div class="field"><label>${L('اسم التجميعة','Bundle name')}</label><input id="bn_name" placeholder="${L('مثال: عرض القهوة','e.g. Coffee Combo')}"></div>

    <table class="inv-items"><thead><tr><th style="width:60%">${L('الصنف','Item')}</th><th>${L('كمية','Qty')}</th><th></th></tr></thead><tbody id="bnBody"></tbody></table>

  <div class="modal-f"><button class="btn btn-primary" onclick="saveBundle()">${L('حفظ','Save')}</button><button class="btn btn-ghost" onclick="bundlesPanel()">${L('رجوع','Back')}</button></div>`,true);
  renderBundleLines();}
function renderBundleLines(){document.getElementById('bnBody').innerHTML=bundleLines.map((ln,i)=>`<tr><td><select onchange="bundleLines[${i}].pid=this.value;bundleSugg()"><option value="">— ${L('اختر','Select')} —</option>${db.products.map(p=>`<option value="${p.id}" ${ln.pid===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></td><td><input type="number" min="1" step="any" value="${ln.qty}" oninput="bundleLines[${i}].qty=+this.value||1;bundleSugg()"></td><td><button class="iconbtn del" onclick="bundleLines.splice(${i},1);if(!bundleLines.length)bundleLines.push({pid:'',qty:1});renderBundleLines();bundleSugg()">×</button></td></tr>`).join('');bundleSugg();}
function addBundleLine(){bundleLines.push({pid:'',qty:1});renderBundleLines();}
function bundleSugg(){const sum=bundleLines.reduce((a,l)=>{const p=findProduct(l.pid);return a+(p?p.price*l.qty:0);},0);const el=document.getElementById('bnSugg');if(el)el.innerHTML=sum>0?`${L('مجموع الأسعار المفردة','Sum of item prices')}: <b>${money(sum)}</b>`:'';}
function saveBundle(){const name=document.getElementById('bn_name').value.trim();if(!name)return toast(L('اكتب اسم التجميعة','Enter bundle name'),'err');
  const items=bundleLines.filter(l=>l.pid&&l.qty>0).map(l=>({pid:l.pid,qty:l.qty}));if(!items.length)return toast(L('أضف مكوّنًا','Add a component'),'err');
  const price=+document.getElementById('bn_price').value||0;if(price<=0)return toast(L('اكتب سعرًا','Enter a price'),'err');
  db.bundles.push({id:uid(),name,items,price});save();bundlesPanel();toast(L('تم حفظ التجميعة','Bundle saved'));}
function delBundle(id){if(!confirm(L('حذف التجميعة؟','Delete bundle?')))return;db.bundles=db.bundles.filter(b=>b.id!==id);save();bundlesPanel();}

function renderCatListHTML(cats){
  if(!cats.length)return `<div class="empty">${L('لا توجد تصنيفات','No categories')}</div>`;
  return cats.map(c=>{
    const count=db.products.filter(p=>p.cat===c).length;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)">
      <span><b>${esc(c)}</b> <span class="badge muted">${count} ${L('صنف','items')}</span></span>
      <button class="iconbtn del" onclick="delCat(${JSON.stringify(c)})">🗑️</button>
    </div>`;
  }).join('');}

function addCatFromModal(){
  const inp=document.getElementById('newCatInput');
  const name=inp.value.trim();
  if(!name)return toast(L('اكتب الاسم','Enter name'),'err');
  if(getAllCats().includes(name))return toast(L('موجود بالفعل','Already exists'),'err');
  db.categories.push({id:uid(),name});
  save();inp.value='';
  document.getElementById('catList').innerHTML=renderCatListHTML(getAllCats());
  toast(L('تمت الإضافة','Added'));}

function delCat(name){
  const count=db.products.filter(p=>p.cat===name).length;
  if(count>0&&!confirm(L(`سيتم إزالة التصنيف من ${count} صنف. متابعة؟`,`Will remove category from ${count} items. Continue?`)))return;
  db.categories=db.categories.filter(c=>c.name!==name);
  db.products.forEach(p=>{if(p.cat===name)p.cat='';});
  save();
  document.getElementById('catList').innerHTML=renderCatListHTML(getAllCats());
  toast(L('تم الحذف','Deleted'));}

function calcProdMargin(){
  const cost=+document.getElementById('f_cost').value||0;
  const price=+document.getElementById('f_price').value||0;
  const el=document.getElementById('marginPreview');if(!el)return;
  if(cost>0&&price>0){
    const margin=Math.round((price-cost)/cost*100);
    const profit=price-cost;
    el.innerHTML=`<div class="hint">📊 ${L('هامش الربح','Margin')}: <b style="color:${margin>=30?'var(--ok)':margin>=15?'var(--gold)':'var(--danger)'}">${margin}%</b> — ${L('ربح الوحدة','Unit profit')}: <b>${money(profit)}</b></div>`;
  }else el.innerHTML='';}

let prodImgData='',prodVariants=[];
function prodPickImage(el){const f=el.files&&el.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{
    const max=240;let w=img.width,h=img.height;if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    prodImgData=cv.toDataURL('image/jpeg',0.72);
    const pv=document.getElementById('f_imgPrev');if(pv)pv.innerHTML=`<img src="${prodImgData}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`;
  };img.src=r.result;};r.readAsDataURL(f);}
function prodClearImage(){prodImgData='';const pv=document.getElementById('f_imgPrev');if(pv)pv.innerHTML='🏷️';}
function saveProduct(id){
  const g=x=>{const e=document.getElementById(x);return e?e.value:'';};
  const name=g('f_name').trim();if(!name)return toast(L('اكتب الاسم','Enter name'),'err');
  let cat=g('f_cat');
  if(cat==='__new__'){cat=g('f_cat_new').trim();if(cat&&!getAllCats().includes(cat))db.categories.push({id:uid(),name:cat});}
  const byWeight=document.getElementById('f_byweight').checked;
  const presets=g('f_presets').split(',').map(x=>Math.round(+x.trim())).filter(x=>x>0);
  const variants=prodVariants.map(v=>({name:(v.name||'').trim(),extra:+v.extra||0})).filter(v=>v.name);
  const d={name,sku:g('f_sku').trim(),cat,unit:byWeight?L('كجم','kg'):(g('f_unit').trim()||L('قطعة','pc')),cost:+g('f_cost')||0,price:+g('f_price')||0,min:+g('f_min')||0,wholeSalePrice:+g('f_wholesale')||0,notes:g('f_notes').trim(),img:prodImgData||'',byWeight,weightPresets:byWeight?(presets.length?presets:[250,500,1000]):[],variants,location:g('f_location').trim(),expiry:g('f_expiry')||''};
  if(id){const old=findProduct(id);
    if(old&&((+old.cost||0)!==d.cost||(+old.price||0)!==d.price)){old.priceHistory=old.priceHistory||[];old.priceHistory.push({date:today(),oldCost:+old.cost||0,newCost:d.cost,oldPrice:+old.price||0,newPrice:d.price});if(old.priceHistory.length>50)old.priceHistory=old.priceHistory.slice(-50);d.priceHistory=old.priceHistory;}
    Object.assign(old,d);}
  else{const qty=+g('f_qty')||0;const np={id:uid(),...d,qty:0};db.products.push(np);if(qty)moveStock(np.id,qty,'in',L('رصيد افتتاحي','Opening stock'));}
  prodImgData='';prodVariants=[];logAudit(id?L('تعديل صنف','Edit item'):L('إضافة صنف','Add item'),name);save();closeModal();views.products();toast(L('تم الحفظ','Saved'));}

function delProduct(id){if(!confirm(L('حذف الصنف؟','Delete item?')))return;const _p=findProduct(id);logAudit(L('حذف صنف','Delete item'),_p?_p.name:'');db.products=db.products.filter(p=>p.id!==id);save();views.products();toast(L('تم الحذف','Deleted'));}

  const w=window.open('','_bc','width=420,height=320');if(!w)return toast(L('اسمح بالنوافذ المنبثقة','Allow pop-ups'),'err');

  const to=document.getElementById('salesTo')?.value||'';

/* Invoice builder */
let invLines=[],invKind='sale';
function invoiceForm(kind,fromQuote,preSupplierId){invKind=kind;invLines=[{pid:'',qty:1,price:0}];
  const isSale=kind!=='purchase';const parties=isSale?db.customers:db.suppliers;let preCust=preSupplierId||'';
  if(fromQuote){const qd=db.quotes.find(x=>x.id===fromQuote);invLines=qd.items.map(it=>({pid:it.pid,qty:it.qty,price:it.price}));preCust=qd.customerId||'';}
  const banksOpt=db.banks.map(b=>`<option value="${b.id}">🏦 ${esc(b.name)}</option>`).join('');
  const payRow=kind==='quote'?'':`<div class="grid3"><div class="field"><label>${L('طريقة الدفع','Payment')}</label><select id="inv_pm" onchange="togglePaid()"><option value="cash">${L('نقدي بالكامل','Full cash')}</option><option value="partial">${L('دفع جزئي','Partial')}</option><option value="credit">${L('آجل بالكامل','Full credit')}</option></select></div>
    <div class="field" id="paidWrap" style="display:none"><label>${L('المدفوع الآن','Paid now')}</label><input id="inv_paid" type="number" value="0" oninput="calcInv()"></div>

    <div class="field" id="dueDateWrap" style="display:none"><label>${L('تاريخ الاستحقاق','Due date')}</label><input id="inv_due" type="date" value="${addDays(today(),30)}"></div></div>`;
  openModal(`<div class="modal-h"><h3>${kind==='quote'?'📝 '+L('عرض سعر','Quotation'):(isSale?'🧾 '+L('فاتورة بيع','Sale Invoice'):'📦 '+L('فاتورة شراء','Purchase Invoice'))}</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b"><div class="grid3"><div class="field"><label>${isSale?L('العميل','Customer'):L('المورد','Supplier')}</label>
    <select id="inv_party"><option value="">${isSale?L('عميل نقدي','Cash'):L('بدون مورد','None')}</option>${parties.map(p=>`<option value="${p.id}" ${p.id===preCust?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
    <div class="field"><label>${L('التاريخ','Date')}</label><input id="inv_date" type="date" value="${today()}"></div><div class="field"></div></div>

    <button class="btn btn-ghost btn-sm" style="margin:10px 0" onclick="addInvLine()">+ ${L('إضافة صنف','Add item')}</button>
    <div class="grid2" style="margin-top:8px"><div class="field"><label>${L('خصم','Discount')} (${cur()})</label><input id="inv_disc" type="number" value="0" oninput="calcInv()"></div>
      <div class="field"><label>${L('ضريبة','Tax')} %</label><input id="inv_vat" type="number" value="${isSale||kind==='quote'?db.settings.vat:0}" oninput="calcInv()"></div></div>
    ${payRow}<div class="inv-totals" id="invTotals"></div></div>
  <div class="modal-f"><button class="btn ${isSale?'btn-primary':'btn-accent'}" onclick="saveInvoice()">${kind==='quote'?L('حفظ العرض','Save quote'):L('حفظ الفاتورة','Save invoice')}</button><button class="btn btn-ghost" onclick="closeModal()">${L('إلغاء','Cancel')}</button></div>`,true);
  renderInvLines();calcInv();}
function renderInvLines(){document.getElementById('invBody').innerHTML=invLines.map((ln,i)=>`<tr><td><select onchange="setLineProduct(${i},this.value)"><option value="">— ${L('اختر','Select')} —</option>${db.products.map(p=>`<option value="${p.id}" ${ln.pid===p.id?'selected':''}>${esc(p.name)} (${p.qty})</option>`).join('')}</select></td>
  <td><input type="number" min="0" step="any" value="${ln.qty}" oninput="invLines[${i}].qty=+this.value;calcInv()"></td><td><input type="number" value="${ln.price}" oninput="invLines[${i}].price=+this.value;calcInv()"></td><td class="t-num">${money(ln.qty*ln.price)}</td><td><button class="iconbtn del" onclick="rmInvLine(${i})">×</button></td></tr>`).join('');}
function setLineProduct(i,pid){invLines[i].pid=pid;const p=findProduct(pid);if(p)invLines[i].price=invKind==='purchase'?p.cost:p.price;renderInvLines();calcInv();}
function addInvLine(){invLines.push({pid:'',qty:1,price:0});renderInvLines();calcInv();}
function rmInvLine(i){invLines.splice(i,1);if(!invLines.length)invLines.push({pid:'',qty:1,price:0});renderInvLines();calcInv();}
function togglePaid(){const pm=document.getElementById('inv_pm').value;document.getElementById('paidWrap').style.display=pm==='partial'?'block':'none';const dw=document.getElementById('dueDateWrap');if(dw)dw.style.display=(pm==='partial'||pm==='credit')?'block':'none';calcInv();}
function calcInv(){const sub=invLines.reduce((s,l)=>s+l.qty*l.price,0);const disc=+document.getElementById('inv_disc').value||0,vatP=+document.getElementById('inv_vat').value||0;
  const afterDisc=Math.max(0,sub-disc),vat=afterDisc*vatP/100,total=afterDisc+vat;
  const pmEl=document.getElementById('inv_pm');if(pmEl){const pm=pmEl.value;let paid=pm==='cash'?total:pm==='credit'?0:(+document.getElementById('inv_paid').value||0);const due=Math.max(0,total-paid);const dh=document.getElementById('dueHint');if(dh)dh.textContent=due>0?`${L('المتبقي','Due')}: ${money(due)}`:L('مدفوعة بالكامل','Fully paid');}
  document.getElementById('invTotals').innerHTML=`<div class="row"><span>${L('الإجمالي الفرعي','Subtotal')}</span><span class="t-num">${money(sub)}</span></div><div class="row"><span>${L('الخصم','Discount')}</span><span class="t-num">- ${money(disc)}</span></div><div class="row"><span>${L('الضريبة','Tax')} (${vatP}%)</span><span class="t-num">${money(vat)}</span></div><div class="row grand"><span>${L('الإجمالي','Total')}</span><span>${money(total)}</span></div>`;
  document.getElementById('invBody').querySelectorAll('tr').forEach((tr,i)=>{if(invLines[i])tr.children[3].textContent=money(invLines[i].qty*invLines[i].price);});
  return {sub,disc,vat,vatP,total};}
function saveInvoice(){const lines=invLines.filter(l=>l.pid&&l.qty>0);if(!lines.length)return toast(L('أضف صنفًا','Add an item'),'err');
  const T=calcInv();const partyId=document.getElementById('inv_party').value;const date=document.getElementById('inv_date').value||today();
  const items=lines.map(l=>{const p=findProduct(l.pid);return {pid:p.id,name:p.name,qty:l.qty,price:l.price,cost:p.cost};});
  if(invKind==='quote'){const party=partyId?findCustomer(partyId):null;db.quotes.push({id:uid(),no:db.seq.quote++,date,customerId:partyId,customerName:party?party.name:'',items,sub:T.sub,disc:T.disc,vat:T.vat,vatP:T.vatP,total:T.total,status:'open'});save();closeModal();go('quotes');toast(L('تم حفظ العرض','Quote saved'));return;}
  const pm=document.getElementById('inv_pm').value;const paid=pm==='cash'?T.total:pm==='credit'?0:Math.min(T.total,+document.getElementById('inv_paid').value||0);const due=Math.max(0,T.total-paid);
  const acct=document.getElementById('inv_acct')?.value||'cash';const dueDate=due>0?(document.getElementById('inv_due')?.value||addDays(date,30)):'';
  if(invKind==='sale'){const origMap={};if(editSaleCtx&&editSaleCtx.orig)editSaleCtx.orig.items.forEach(it=>{origMap[it.pid]=(origMap[it.pid]||0)+it.qty;});
    for(const l of lines){const p=findProduct(l.pid);const allowed=p.qty+(origMap[l.pid]||0);if(l.qty>allowed)return toast(`${L('الكمية أكبر من المتاح','Qty exceeds stock')}: ${p.name} (${allowed})`,'err');}
    const cost=items.reduce((s,i)=>s+i.cost*i.qty,0);const party=partyId?findCustomer(partyId):null;if(due>0&&!party)return toast(L('اختر عميلًا للآجل','Select a customer for credit'),'err');
    const origDue=editSaleCtx&&editSaleCtx.orig&&editSaleCtx.orig.customerId===partyId?(editSaleCtx.orig.dueAmount||0):0;
    if(due>0&&party&&party.creditLimit>0&&(party.balance-origDue+due)>party.creditLimit)return toast(`${L('تجاوز حد الائتمان','Credit limit exceeded')} (${money(party.creditLimit)})`,'err');
    let saleNo,saleId=uid(),src='invoice';
    if(editSaleCtx&&editSaleCtx.orig){const o=editSaleCtx.orig;reverseSaleEffects(o);db.sales=db.sales.filter(x=>x.id!==o.id);saleNo=o.no;src=o.source||'invoice';db.editLog.push({id:uid(),at:new Date().toISOString(),user:isManager()?'manager':'cashier',saleNo,oldTotal:o.total,newTotal:T.total});}
    else saleNo=db.seq.sale++;
    const rec={id:saleId,no:saleNo,date,ts:new Date().toISOString(),customerId:partyId,customerName:party?party.name:'',items,sub:T.sub,disc:T.disc,vat:T.vat,vatP:T.vatP,total:T.total,cost,profit:T.total-T.vat-cost,paidAmount:paid,dueAmount:due,dueDate,payMethod:pm,acct,branch:activeBranch(),source:src,edited:!!editSaleCtx};
    db.sales.push(rec);items.forEach(it=>moveStock(it.pid,-it.qty,'out',`بيع #${rec.no}`,rec.id));addCash('in',paid,`بيع #${rec.no}`,rec.id,acct);if(due>0&&party)party.balance+=due;
    if(party)awardPoints(party,T.total);bumpOps();const wasEdit=!!editSaleCtx;editSaleCtx=null;
    logAudit(wasEdit?L('تعديل فاتورة بيع','Edit sale'):L('فاتورة بيع','Sale invoice'),`${invNo(rec)} — ${money(T.total)}`);save();closeModal();go('sales');toast(wasEdit?L('تم تعديل الفاتورة','Invoice updated'):L('تم حفظ الفاتورة','Invoice saved'));viewInvoice('sale',rec.id);
  }else{const party=partyId?findSupplier(partyId):null;if(due>0&&!party)return toast(L('اختر موردًا للآجل','Select a supplier for credit'),'err');
    const rec={id:uid(),no:db.seq.purchase++,date,supplierId:partyId,supplierName:party?party.name:'',items,sub:T.sub,disc:T.disc,vat:T.vat,vatP:T.vatP,total:T.total,paidAmount:paid,dueAmount:due,dueDate,payMethod:pm,acct,branch:activeBranch()};
    db.purchases.push(rec);items.forEach(it=>{const p=findProduct(it.pid);if(p){const oldQty=p.qty,oldCost=p.cost||0;moveStock(it.pid,it.qty,'in',`شراء #${rec.no}`,rec.id);const newQty=oldQty+it.qty;p.cost=newQty>0?Math.round((oldQty*oldCost+it.qty*it.price)/newQty*100)/100:it.price;}});addCash('out',paid,`شراء #${rec.no}`,rec.id,acct);if(due>0&&party)party.balance+=due;bumpOps();
    logAudit(L('فاتورة شراء','Purchase invoice'),`${invNo(rec)} — ${money(T.total)}`);save();closeModal();go('purchases');toast(L('تم حفظ الفاتورة','Invoice saved'));}}
function collectInvoice(kind,id){const isSale=kind==='sale';const s=(isSale?db.sales:db.purchases).find(x=>x.id===id);
  const amt=prompt(`${isSale?L('تحصيل','Collect'):L('سداد','Pay')} #${s.no} — ${L('المتبقي','Due')} ${money(s.dueAmount)}`,s.dueAmount);if(amt===null)return;const v=Math.min(+amt||0,s.dueAmount);if(v<=0)return;
  const acct=s.acct||'cash';
  s.dueAmount-=v;s.paidAmount=(s.paidAmount||0)+v;
  if(isSale){addCash('in',v,`تحصيل #${s.no}`,id,acct);const c=findCustomer(s.customerId);if(c)c.balance-=v;}else{addCash('out',v,`سداد #${s.no}`,id,acct);const sp=findSupplier(s.supplierId);if(sp)sp.balance-=v;}
  logAudit(isSale?L('تحصيل','Collection'):L('سداد','Payment'),`#${s.no} — ${money(v)}`);save();go(isSale?'sales':'purchases');toast(L('تم تسجيل الدفعة','Payment recorded'));}

      <div class="inv-totals" style="margin:0"><div class="row"><span>${L('الإجمالي الفرعي','Subtotal')}</span><span class="t-num">${money(s.sub)}</span></div><div class="row"><span>${L('الخصم','Discount')}</span><span class="t-num">- ${money(s.disc)}</span></div><div class="row"><span>${L('الضريبة','Tax')} (${s.vatP}%)</span><span class="t-num">${money(s.vat)}</span></div><div class="row grand"><span>${L('الإجمالي','Total')}</span><span>${money(s.total)}</span></div><div class="row"><span>${L('المدفوع','Paid')}</span><span class="t-num">${money(s.paidAmount||0)}</span></div>${s.payMethod==='split'?`<div class="row" style="font-size:12px;color:var(--muted)"><span>💵 ${L('نقدي','Cash')}</span><span class="t-num">${money(s.splitCash||0)}</span></div><div class="row" style="font-size:12px;color:var(--muted)"><span>💳 ${L('بطاقة','Card')}</span><span class="t-num">${money(s.splitCard||0)}</span></div>`:''}${(s.received!=null&&s.payMethod==='cash'&&(s.change||0)>0)?`<div class="row"><span>${L('المستلم','Received')}</span><span class="t-num">${money(s.received)}</span></div><div class="row" style="color:var(--primary-d)"><span>${L('الباقي','Change')}</span><span class="t-num">${money(s.change)}</span></div>`:''}${(s.dueAmount||0)>0?`<div class="row" style="color:var(--danger)"><span>${L('المتبقي','Due')}</span><span class="t-num">${money(s.dueAmount)}</span></div>${s.dueDate?`<div class="row" style="color:var(--danger)"><span>${L('تاريخ الاستحقاق','Due date')}</span><span class="t-num">${s.dueDate}</span></div>`:''}`:''}</div></div>

function waNumber(raw){let d=(raw||'').replace(/\D/g,'');if(!d)return '';if(d.startsWith('00'))d=d.slice(2);else if(d.startsWith('0'))d='20'+d.slice(1);return d;}
function waSend(kind,id){const isSale=kind==='sale';const s=(isSale?db.sales:db.purchases).find(x=>x.id===id);if(!s)return;const st=db.settings;
  const party=isSale?findCustomer(s.customerId):findSupplier(s.supplierId);

function saveReturn(){const isSale=retCtx.kind==='sale';const lines=retLines.filter(l=>l.ret>0);if(!lines.length)return toast(L('حدّد كمية','Set a quantity'),'err');
  const total=lines.reduce((s,l)=>s+l.ret*l.price,0),cost=lines.reduce((s,l)=>s+l.ret*l.cost,0);const s=retCtx.s;
  const rec={id:uid(),no:db.seq.ret++,date:today(),type:retCtx.kind,refNo:s.no,refId:s.id,partyName:(isSale?s.customerName:s.supplierName)||L('نقدي','Cash'),items:lines.map(l=>({name:l.name,qty:l.ret,price:l.price})),total,cost};
  db.returns.push(rec);
  const racct=s.acct||'cash';
  if(isSale){lines.forEach(l=>moveStock(l.pid,l.ret,'in',`مرتجع بيع #${rec.no}`,rec.id));if((s.dueAmount||0)>0&&s.customerId){const c=findCustomer(s.customerId);const cut=Math.min(s.dueAmount,total);s.dueAmount-=cut;if(c)c.balance-=cut;addCash('out',total-cut,`رد مرتجع #${rec.no}`,rec.id,racct);}else addCash('out',total,`رد مرتجع #${rec.no}`,rec.id,racct);}
  else{lines.forEach(l=>moveStock(l.pid,-l.ret,'out',`مرتجع شراء #${rec.no}`,rec.id));if((s.dueAmount||0)>0&&s.supplierId){const sp=findSupplier(s.supplierId);const cut=Math.min(s.dueAmount,total);s.dueAmount-=cut;if(sp)sp.balance-=cut;addCash('in',total-cut,`استرداد #${rec.no}`,rec.id,racct);}else addCash('in',total,`استرداد #${rec.no}`,rec.id,racct);}
  logAudit(L('مرتجع','Return'),`#${rec.no} (${isSale?L('بيع','sale'):L('شراء','purchase')}) — ${money(total)}`);save();closeModal();go('returns');toast(L('تم تسجيل المرتجع','Return recorded'));}

function saveAsRecurring(id){const s=db.sales.find(x=>x.id===id);if(!s)return;
  const label=prompt(L('اسم الفاتورة المتكررة (مثل: اشتراك شهري):','Recurring template name (e.g. Monthly subscription):'),s.customerName||L('فاتورة متكررة','Recurring invoice'));if(label===null)return;

function recurringPanel(){

  <div class="modal-b">${db.recurring.length?`<table><thead><tr><th>${L('الاسم','Name')}</th><th>${L('العميل','Customer')}</th><th>${L('الأصناف','Items')}</th><th>${L('آخر إصدار','Last issued')}</th><th></th></tr></thead><tbody>
  ${db.recurring.map(r=>`<tr><td><b>${esc(r.label)}</b></td><td>${esc(r.customerName)||L('نقدي','Cash')}</td><td class="t-num">${r.items.length}</td><td style="font-size:11px;color:var(--muted)">${r.lastIssued||L('لم تصدر','Never')}</td><td style="text-align:left"><button class="btn btn-primary btn-sm" onclick="issueRecurring('${r.id}')">${L('إصدار الآن','Issue now')}</button> <button class="iconbtn del" onclick="delRecurring('${r.id}')">🗑️</button></td></tr>`).join('')}
  </tbody></table>`:`<div class="empty"><span class="big">🔁</span>${L('لا توجد فواتير متكررة — احفظ أي فاتورة بيع كمتكررة من زر «حفظ كمتكررة».','No recurring invoices — save any sale as recurring from its "Save recurring" button.')}</div>`}</div>
  <div class="modal-f"><button class="btn btn-ghost" onclick="closeModal()">${L('إغلاق','Close')}</button></div>`);}
function issueRecurring(id){const r=db.recurring.find(x=>x.id===id);if(!r)return;
  // Stock check
  for(const it of r.items){const p=findProduct(it.pid);if(!p)return toast(L('صنف محذوف في القالب','Template has a deleted item'),'err');if(it.qty>p.qty)return toast(`${L('الكمية أكبر من المتاح','Qty exceeds stock')}: ${p.name} (${p.qty})`,'err');}
  const sub=r.items.reduce((a,it)=>a+it.qty*it.price,0);const afterDisc=Math.max(0,sub-(r.disc||0));const vat=afterDisc*(r.vatP||0)/100;const total=afterDisc+vat;
  const cost=r.items.reduce((a,it)=>a+(it.cost||0)*it.qty,0);const party=r.customerId?findCustomer(r.customerId):null;
  const rec={id:uid(),no:db.seq.sale++,date:today(),ts:new Date().toISOString(),customerId:r.customerId||'',customerName:party?party.name:r.customerName||'',items:r.items.map(it=>({pid:it.pid,name:it.name,qty:it.qty,price:it.price,cost:it.cost||0})),sub,disc:r.disc||0,vat,vatP:r.vatP||0,total,cost,profit:total-vat-cost,paidAmount:total,dueAmount:0,payMethod:'cash',acct:'cash',branch:activeBranch(),source:'recurring'};
  db.sales.push(rec);rec.items.forEach(it=>moveStock(it.pid,-it.qty,'out',`فاتورة متكررة #${rec.no}`,rec.id));addCash('in',total,`فاتورة متكررة #${rec.no}`,rec.id,'cash');
  r.lastIssued=today();bumpOps();save();closeModal();toast(L('تم إصدار الفاتورة','Invoice issued')+' '+invNo(rec));viewInvoice('sale',rec.id);}
function delRecurring(id){if(!confirm(L('حذف القالب المتكرر؟','Delete recurring template?')))return;db.recurring=db.recurring.filter(x=>x.id!==id);save();recurringPanel();}
function redeemPoints(id){const c=findCustomer(id);const pts=c.points||0;if(pts<=0)return;const val=pts*db.settings.loyaltyValue;

  c.points=0;c.balance-=val;addCash('out',0,`استبدال نقاط ${c.name}`);save();views.customers();toast(L('تم الاستبدال','Redeemed'));}

const PAY_LBL=()=>({cash:L('كاش','Cash'),card:L('بطاقة','Card'),wallet:L('محفظة','Wallet'),transfer:L('تحويل','Transfer')});
function tallyPay(acc,s){const paid=(s.paidAmount!=null?s.paidAmount:s.total);const k=s.payMethod||'cash';
  if(k==='split'){acc.cash=(acc.cash||0)+(s.splitCash||0);acc.card=(acc.card||0)+(s.splitCard||0);}
  else{if(acc[k]==null)acc[k]=0;acc[k]+=paid;}}
let shiftReport=null;
function computeShift(date){
  const sales=bf(db.sales).filter(s=>s.date===date);
  const rets=bf(db.returns).filter(r=>r.type==='sale'&&r.date===date);
  const pay={cash:0,card:0,wallet:0,transfer:0};
  sales.forEach(s=>tallyPay(pay,s));
  const credit=sales.reduce((a,s)=>a+(s.dueAmount||0),0);
  const gross=sales.reduce((a,s)=>a+s.total,0);
  const disc=sales.reduce((a,s)=>a+(s.disc||0),0);
  const vat=sales.reduce((a,s)=>a+(s.vat||0),0);
  const profit=sales.reduce((a,s)=>a+(s.profit||0),0);
  const cashRefund=rets.reduce((a,r)=>a+r.total,0);
  return {date,count:sales.length,gross,disc,vat,profit,pay,credit,cashRefund};}

function shiftCalcDrawer(){if(!shiftReport)return;const fl=+(document.getElementById('sh_float')?.value)||0;

/* ===== Team (org members + invites) — manager only ===== */
async function renderTeam(){
  const panel=document.getElementById('teamPanel'); const body=document.getElementById('teamBody');
  if(!panel||!body)return;
  if(!sb||!CURRENT_ORG||CURRENT_ROLE!=='manager'){panel.style.display='none';return;}
  panel.style.display='';
  try{
    const [{data:members},{data:invites}]=await Promise.all([
      sb.from('org_members').select('user_id,role,email').eq('org_id',CURRENT_ORG),
      sb.from('org_invites').select('id,email,role').eq('org_id',CURRENT_ORG)
    ]);
    const roleAr=r=>({manager:L('مدير','Manager'),cashier:L('كاشير','Cashier'),accountant:L('محاسب','Accountant')}[r]||r);
    const meRow=(members||[]).map(m=>{const isMe=m.user_id===CURRENT_UID;return `<tr><td>${esc(m.email||'—')} ${isMe?`<span class="badge muted">${L('أنت','You')}</span>`:''}</td><td><span class="badge ok">${roleAr(m.role)}</span></td><td style="text-align:left">${(m.role!=='manager')?`<button class="btn btn-ghost btn-sm" onclick="removeMember('${m.user_id}')">🗑️ ${L('إزالة','Remove')}</button>`:''}</td></tr>`;}).join('');
    const invRows=(invites||[]).map(i=>`<tr><td>${esc(i.email)} <span class="badge warn">${L('دعوة معلّقة','Pending')}</span></td><td><span class="badge muted">${roleAr(i.role)}</span></td><td style="text-align:left"><button class="btn btn-ghost btn-sm" onclick="cancelInvite('${i.id}')">✖ ${L('إلغاء','Cancel')}</button></td></tr>`).join('');
    body.innerHTML=`
      <div class="hint">👥 ${L('ادعُ موظفينك بإيميلهم. الموظف يعمل حساب بنفس الإيميل ويدخل على بيانات نفس المحل بالدور اللي تحدده.','Invite staff by email. They sign up with the same email and access this shop with the role you set.')}</div>
      <table><thead><tr><th>${L('الإيميل','Email')}</th><th>${L('الدور','Role')}</th><th></th></tr></thead><tbody>${meRow}${invRows}</tbody></table>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input id="inv_email" type="email" placeholder="${L('إيميل الموظف','Staff email')}" style="flex:1;min-width:180px;text-align:left;letter-spacing:normal">
        <select id="inv_role"><option value="cashier">${L('كاشير','Cashier')}</option><option value="accountant">${L('محاسب','Accountant')}</option></select>
        <button class="btn btn-primary" onclick="sendInvite()">➕ ${L('دعوة','Invite')}</button>
      </div>`;
  }catch(e){body.innerHTML=`<div class="hint" style="color:var(--danger)">${L('تعذّر تحميل الفريق','Could not load team')}</div>`;}
}
async function sendInvite(){
  const email=(document.getElementById('inv_email').value||'').trim().toLowerCase();
  const role=document.getElementById('inv_role').value;
  if(!email||!/.+@.+\..+/.test(email))return toast(L('اكتب إيميل صحيح','Enter a valid email'),'err');
  if(email===(db.settings.cloudEmail||'').toLowerCase())return toast(L('ده إيميلك إنت','That is your own email'),'err');
  try{
    const {error}=await sb.from('org_invites').upsert({org_id:CURRENT_ORG,email,role},{onConflict:'org_id,email'});
    if(error)throw error;
    logAudit(L('دعوة موظف','Invite staff'),`${email} — ${role}`);await save();
    toast(L('تمت الدعوة','Invited'));renderTeam();
  }catch(e){toast((e&&e.message)||L('تعذّرت الدعوة','Invite failed'),'err');}
}
async function cancelInvite(id){
  if(!confirm(L('إلغاء الدعوة؟','Cancel invite?')))return;
  try{const {error}=await sb.from('org_invites').delete().eq('id',id);if(error)throw error;renderTeam();}
  catch(e){toast((e&&e.message)||L('تعذّر الإلغاء','Failed'),'err');}
}
async function removeMember(userId){
  if(userId===CURRENT_UID)return toast(L('مينفعش تشيل نفسك','You cannot remove yourself'),'err');
  if(!confirm(L('إزالة الموظف من المحل؟','Remove this member?')))return;
  try{const {error}=await sb.from('org_members').delete().eq('org_id',CURRENT_ORG).eq('user_id',userId);if(error)throw error;
    logAudit(L('إزالة موظف','Remove member'),userId);await save();toast(L('تمت الإزالة','Removed'));renderTeam();}
  catch(e){toast((e&&e.message)||L('تعذّرت الإزالة','Failed'),'err');}
}
async function renderSnapList(){const el=document.getElementById('snapList');if(!el)return;const snaps=await getSnaps();
  const RT={manual:L('يدوي','Manual'),auto:L('تلقائي','Auto'),'before-restore':L('قبل استعادة','Pre-restore'),'before-import':L('قبل استرجاع ملف','Pre-import'),'before-reset':L('قبل حذف','Pre-reset')};
  el.innerHTML=snaps.length?`<table><thead><tr><th>${L('التاريخ والوقت','Date & time')}</th><th>${L('النوع','Type')}</th><th>${L('الفواتير','Invoices')}</th><th></th></tr></thead><tbody>
    ${snaps.map(s=>{const d=new Date(s.at);const dt=d.toLocaleDateString(LANG==='ar'?'ar-EG':'en-US')+' '+d.toLocaleTimeString(LANG==='ar'?'ar-EG':'en-US',{hour:'2-digit',minute:'2-digit'});

/* ---- Local snapshots (keep last 5) ---- */
const SNAP_KEY='hesaby_snaps';
async function getSnaps(){try{const r=await window.storage.get(SNAP_KEY);return r&&r.value?JSON.parse(r.value):[];}catch(e){return [];}}
async function makeSnapshot(reason){try{const snaps=await getSnaps();
  snaps.unshift({id:uid(),at:new Date().toISOString(),reason:reason||'manual',sales:db.sales.length,data:JSON.stringify(db)});
  while(snaps.length>5)snaps.pop();
  await window.storage.set(SNAP_KEY,JSON.stringify(snaps));return true;}catch(e){return false;}}
async function snapshotNow(){const ok=await makeSnapshot('manual');toast(ok?L('تم حفظ نسخة داخلية','Snapshot saved'):L('تعذّر الحفظ','Snapshot failed'),ok?'':'err');if(current==='settings')views.settings();}
async function restoreSnapshot(id){const snaps=await getSnaps();const s=snaps.find(x=>x.id===id);if(!s)return;
  if(!confirm(L('سيتم استبدال البيانات الحالية بهذه النسخة. متابعة؟','This replaces current data with the snapshot. Continue?')))return;
  await makeSnapshot('before-restore');db=JSON.parse(s.data);migrate();save();applyLang();applyBrand();renderBranchSel();go('dashboard');toast(L('تم الاستعادة','Restored'));}
async function autoBackupCheck(){const mode=db.settings.autoBackup;if(mode==='off')return;
  // Always keep an internal snapshot per session start
  await makeSnapshot('auto');
  // Scheduled file export (daily/weekly) — only if data exists and due
  if(!db.sales.length&&!db.purchases.length)return;
  const last=db.settings.lastAutoExport||'';const t0=today();
  let due=false;
  if(mode==='daily')due=last!==t0;
  else if(mode==='weekly'){if(!last)due=true;else due=Math.floor((Date.now()-new Date(last).getTime())/86400000)>=7;}
  if(due){setTimeout(()=>{if(confirm(L('حان وقت النسخة الاحتياطية التلقائية. تنزيل نسخة الآن؟','Time for your scheduled backup. Download now?')))doExport(false);else{db.settings.lastAutoExport=t0;save();}},900);}}
function downloadCSV(filename,rows){const csv=rows.map(r=>r.map(c=>{const v=(c==null?'':''+c).replace(/"/g,'""');return /[",\n]/.test(v)?`"${v}"`:v;}).join(',')).join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();toast(L('تم تصدير الملف','File exported'));}
function importData(el){const f=el.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{try{const d=JSON.parse(r.result);if(!d.products)throw 0;if(!confirm(L('سيتم استبدال كل البيانات. متابعة؟','This replaces all data. Continue?')))return;await makeSnapshot('before-import');db=d;migrate();save();applyLang();applyBrand();renderBranchSel();go('dashboard');toast(L('تم الاسترجاع','Restored'));}catch(e){toast(L('ملف غير صالح','Invalid file'),'err');}};r.readAsText(f);el.value='';}
async function resetAll(){if(!confirm(L('حذف كل البيانات نهائيًا؟','Permanently delete all data?')))return;await makeSnapshot('before-reset');const keep=db.settings;db={products:[],customers:[],suppliers:[],sales:[],purchases:[],returns:[],quotes:[],expenses:[],cash:[],stockMoves:[],branches:[],shifts:[],heldSales:[],editLog:[],banks:[],recurring:[],bundles:[],audit:[],users:[],settings:{company:'مشروعي',vat:VAT_DEFAULT,currency:'ج.م',address:'',phone:'',taxNumber:'',pin:'',theme:keep.theme,lang:keep.lang,activeBranch:'',role:'manager',cashierPin:'',posVat:keep.posVat||false},seq:{sale:1,purchase:1,ret:1,quote:1,shift:1}};migrate();save();renderBranchSel();go('dashboard');toast(L('تم الحذف','Cleared'));}

function paySalary(id){
  const e=db.employees.find(x=>x.id===id);
  const month=today().slice(0,7);
  const already=(e.payments||[]).find(p=>p.month===month);
  if(already)return toast(L('تم صرف راتب هذا الشهر','Already paid this month'),'err');
  const amt=prompt(L(`صرف راتب ${e.name} (${money(e.salary)})`,`Pay salary for ${e.name} (${money(e.salary)})`),e.salary);
  if(amt===null)return;const v=+amt;if(!v||v<=0)return;
  if(!e.payments)e.payments=[];
  e.payments.push({id:uid(),month,date:today(),amount:v});
  addCash('out',v,`${L('راتب','Salary')}: ${e.name} ${month}`);

  const expId=uid();db.expenses.push({id:expId,date:today(),cat:L('رواتب','Salaries'),amount:v,note:`${L('راتب','Salary')}: ${e.name}`});

function donutSVG(pct){
  const r=46,cx=60,cy=60,circ=2*Math.PI*r;
  const fill=circ*(1-pct/100);
  const color=pct>=100?'var(--ok)':pct>=80?'var(--gold)':'var(--accent)';
  return `<div class="progress-ring">
    <svg viewBox="0 0 120 120" width="120" height="120">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line)" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
        stroke-dasharray="${circ}" stroke-dashoffset="${fill}" stroke-linecap="round"/>
    </svg>
    <div class="val">${pct}%</div>
  </div>`;}

function targetForm(id){

  openModal(`<div class="modal-h"><h3>${id?L('تعديل الهدف','Edit Target'):L('هدف جديد','New Target')}</h3><button class="x" onclick="closeModal()">×</button></div>

      <div class="field"><label>${L('هدف المبيعات','Sales Target')} (${cur()})</label><input id="tg_amt" type="number" step="100" value="${t.amount||''}"></div>

function saveTarget(id){
  const month=document.getElementById('tg_month').value;
  const amount=+document.getElementById('tg_amt').value||0;
  const notes=document.getElementById('tg_notes').value.trim();
  if(!month||!amount)return toast(L('اكتب الشهر والهدف','Enter month and amount'),'err');
  if(id)Object.assign(db.targets.find(x=>x.id===id),{month,amount,notes});
  else{const existing=db.targets.find(t=>t.month===month);
    if(existing)Object.assign(existing,{amount,notes});
    else db.targets.push({id:uid(),month,amount,notes});}
  save();closeModal();views.targets();toast(L('تم الحفظ','Saved'));}
